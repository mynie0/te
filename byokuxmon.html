<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BYOKUXMON - Map Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            font-family: 'Segoe UI', 'Consolas', monospace;
            color: #e8e8f0;
        }

        /* Header */
        .header {
            background: #12121a;
            padding: 16px 24px;
            border-bottom: 2px solid #cc0000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .logo h1 {
            font-size: 24px;
            color: #ff3333;
            letter-spacing: 2px;
        }

        .logo p {
            font-size: 10px;
            color: #888899;
            letter-spacing: 1px;
        }

        .status {
            background: #1a1a26;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 12px;
            color: #22c55e;
        }

        /* Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Toolbar */
        .toolbar {
            background: #12121a;
            padding: 16px 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            justify-content: space-between;
        }

        .search-box {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #0f0f1a;
            padding: 6px 12px;
            border-radius: 8px;
            border: 1px solid #2a1a2a;
        }

        .search-box input {
            background: transparent;
            border: none;
            color: #e8e8f0;
            font-size: 14px;
            padding: 8px;
            width: 250px;
            outline: none;
        }

        .filter-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .btn-filter {
            background: #1a1a26;
            border: none;
            color: #e8e8f0;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-family: monospace;
            transition: all 0.2s;
        }

        .btn-filter.active {
            background: #cc0000;
            color: white;
        }

        .btn-filter:hover {
            background: #2a0a0a;
        }

        .btn-primary {
            background: #cc0000;
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-family: monospace;
            transition: all 0.2s;
        }

        .btn-primary:hover {
            background: #ff3333;
        }

        .btn-secondary {
            background: #1a1a26;
            border: none;
            color: #e8e8f0;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-family: monospace;
        }

        .btn-secondary:hover {
            background: #2a2a3a;
        }

        .btn-danger {
            background: #3a0000;
            border: none;
            color: #ef4444;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
        }

        .btn-danger:hover {
            background: #5a0000;
        }

        /* Stats */
        .stats {
            margin-bottom: 16px;
            color: #888899;
            font-size: 13px;
        }

        /* Table */
        .map-table {
            background: #12121a;
            border-radius: 12px;
            overflow: hidden;
        }

        .table-header {
            display: grid;
            grid-template-columns: 50px 1fr 1.5fr 100px 120px;
            background: #1f1f2e;
            padding: 12px 16px;
            font-weight: bold;
            color: #ff6666;
            font-size: 13px;
            border-bottom: 1px solid #2a1a2a;
        }

        .map-row {
            display: grid;
            grid-template-columns: 50px 1fr 1.5fr 100px 120px;
            padding: 12px 16px;
            border-bottom: 1px solid #1a1a26;
            transition: background 0.2s;
        }

        .map-row:hover {
            background: #1f1f2e;
        }

        .map-name {
            font-weight: bold;
        }

        .map-name.locked {
            color: #f59e0b;
        }

        .map-url {
            color: #888899;
            font-size: 12px;
            font-family: monospace;
            word-break: break-all;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
        }

        .status-unlocked {
            background: #064e3b;
            color: #22c55e;
        }

        .status-locked {
            background: #451a03;
            color: #f59e0b;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            transition: transform 0.1s;
        }

        .action-btn:hover {
            transform: scale(1.1);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #12121a;
            border-radius: 16px;
            width: 500px;
            max-width: 90%;
            border-top: 3px solid #cc0000;
        }

        .modal-header {
            padding: 20px;
            border-bottom: 1px solid #2a1a2a;
            font-size: 18px;
            font-weight: bold;
        }

        .modal-body {
            padding: 20px;
        }

        .modal-footer {
            padding: 16px 20px;
            border-top: 1px solid #2a1a2a;
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #888899;
            font-size: 12px;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            background: #0f0f1a;
            border: 1px solid #2a1a2a;
            padding: 10px;
            border-radius: 8px;
            color: #e8e8f0;
            font-family: monospace;
        }

        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: #cc0000;
        }

        .dropzone {
            border: 2px dashed #2a1a2a;
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .dropzone:hover {
            border-color: #cc0000;
            background: #1a0a0a;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #2a1a2a;
            border-radius: 3px;
            overflow: hidden;
            margin-top: 12px;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: #cc0000;
            transition: width 0.3s;
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 20px;
        }

        .page-btn {
            background: #1a1a26;
            border: none;
            color: #e8e8f0;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
        }

        .page-btn.active {
            background: #cc0000;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1a1a26;
            padding: 12px 20px;
            border-radius: 8px;
            border-left: 3px solid #22c55e;
            animation: slideIn 0.3s ease;
            z-index: 1001;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @media (max-width: 768px) {
            .table-header, .map-row {
                grid-template-columns: 40px 1fr 100px 80px;
                gap: 8px;
            }
            .map-url {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">
            <h1>⚡ BYOKUXMON</h1>
            <p>// MAP MANAGER v2.0</p>
        </div>
        <div class="status" id="statusBadge">
            🟢 Online | Local Storage
        </div>
    </div>

    <div class="container">
        <div class="toolbar">
            <div class="search-box">
                <span>🔍</span>
                <input type="text" id="searchInput" placeholder="Cari map...">
            </div>
            <div class="filter-buttons">
                <button class="btn-filter active" data-filter="all">📋 Semua</button>
                <button class="btn-filter" data-filter="unlocked">🔓 Unlocked</button>
                <button class="btn-filter" data-filter="locked">🔒 Locked</button>
            </div>
            <div>
                <button class="btn-primary" id="addMapBtn">＋ Add New Map</button>
                <button class="btn-secondary" id="cleanupBtn" style="margin-left: 8px;">🗑 Cleanup</button>
            </div>
        </div>

        <div class="stats" id="stats">
            Memuat data...
        </div>

        <div class="map-table" id="mapTable">
            <div class="table-header">
                <div>#</div>
                <div>Nama Map</div>
                <div>File / URL</div>
                <div>Status</div>
                <div>Aksi</div>
            </div>
            <div id="mapRows">
                <!-- Map rows will be inserted here -->
            </div>
        </div>

        <div class="pagination" id="pagination"></div>
    </div>

    <!-- Add/Edit Modal -->
    <div class="modal" id="mapModal">
        <div class="modal-content">
            <div class="modal-header" id="modalTitle">Tambah Map Baru</div>
            <div class="modal-body">
                <div class="form-group">
                    <label>📛 Nama Map</label>
                    <input type="text" id="mapName" placeholder="Masukkan nama map...">
                </div>
                <div class="form-group">
                    <label>🔗 Nama File (.json)</label>
                    <input type="text" id="mapFile" placeholder="contoh: map_data.json">
                </div>
                <div class="form-group">
                    <label>📦 Upload ZIP (Opsional)</label>
                    <div class="dropzone" id="dropzone">
                        📦 Drag & Drop file .zip di sini<br>
                        <small>atau klik untuk browse</small>
                    </div>
                    <div id="fileInfo" style="margin-top: 8px; font-size: 12px; color: #888;"></div>
                </div>
                <div class="progress-bar" id="progressBar" style="display: none;">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" id="cancelModalBtn">Batal</button>
                <button class="btn-primary" id="saveMapBtn">Simpan</button>
            </div>
        </div>
    </div>

    <!-- Cleanup Modal -->
    <div class="modal" id="cleanupModal">
        <div class="modal-content">
            <div class="modal-header">🗑 Cleanup File Orphaned</div>
            <div class="modal-body">
                <p>File JSON berikut tidak terdaftar di database:</p>
                <div id="orphanedList" style="margin-top: 16px; max-height: 300px; overflow-y: auto;"></div>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" id="cancelCleanupBtn">Batal</button>
                <button class="btn-danger" id="confirmCleanupBtn">Hapus</button>
            </div>
        </div>
    </div>

    <script>
        // Data storage
        let mapsData = [];
        let currentFilter = 'all';
        let currentPage = 1;
        let itemsPerPage = 10;
        let editIndex = -1;
        let selectedZipFile = null;

        // Load data from localStorage
        function loadData() {
            const saved = localStorage.getItem('byokuxmon_maps');
            if (saved) {
                mapsData = JSON.parse(saved);
            } else {
                // Default data
                mapsData = [
                    { name: "Deathrun Paradise", url: "deathrun_paradise.json", locked: false },
                    { name: "Bhop Elite", url: "bhop_elite.json", locked: true },
                    { name: "Survival Island", url: "survival_island.json", locked: false },
                    { name: "Parkour Master", url: "parkour_master.json", locked: true },
                    { name: "Zombie Escape", url: "zombie_escape.json", locked: false }
                ];
                saveData();
            }
            renderStats();
            renderTable();
        }

        function saveData() {
            localStorage.setItem('byokuxmon_maps', JSON.stringify(mapsData));
        }

        // Filter maps
        function getFilteredMaps() {
            let filtered = [...mapsData];
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            if (searchTerm) {
                filtered = filtered.filter(m => 
                    m.name.toLowerCase().includes(searchTerm) || 
                    m.url.toLowerCase().includes(searchTerm)
                );
            }
            
            if (currentFilter === 'unlocked') {
                filtered = filtered.filter(m => !m.locked);
            } else if (currentFilter === 'locked') {
                filtered = filtered.filter(m => m.locked);
            }
            
            return filtered;
        }

        function renderStats() {
            const filtered = getFilteredMaps();
            const total = filtered.length;
            const pages = Math.ceil(total / itemsPerPage);
            document.getElementById('stats').innerHTML = 
                `📊 Menampilkan ${Math.min(itemsPerPage, total)} dari ${total} map | Halaman ${currentPage}/${pages || 1}`;
        }

        function renderTable() {
            const filtered = getFilteredMaps();
            const totalPages = Math.ceil(filtered.length / itemsPerPage);
            
            if (currentPage > totalPages) currentPage = Math.max(1, totalPages);
            
            const start = (currentPage - 1) * itemsPerPage;
            const pageMaps = filtered.slice(start, start + itemsPerPage);
            const container = document.getElementById('mapRows');
            
            if (pageMaps.length === 0) {
                container.innerHTML = '<div style="padding: 40px; text-align: center; color: #888;">Tidak ada map yang ditemukan</div>';
                document.getElementById('pagination').innerHTML = '';
                return;
            }
            
            container.innerHTML = pageMaps.map((map, idx) => {
                const realIndex = mapsData.findIndex(m => m.name === map.name && m.url === map.url);
                const displayNum = start + idx + 1;
                return `
                    <div class="map-row">
                        <div>${displayNum}</div>
                        <div class="map-name ${map.locked ? 'locked' : ''}">${escapeHtml(map.name)}</div>
                        <div class="map-url">${escapeHtml(map.url)}</div>
                        <div>
                            <span class="status-badge ${map.locked ? 'status-locked' : 'status-unlocked'}">
                                ${map.locked ? '🔒 LOCKED' : '🔓 UNLOCKED'}
                            </span>
                        </div>
                        <div class="action-buttons">
                            <button class="action-btn" onclick="toggleLock(${realIndex})" title="Toggle Lock">${map.locked ? '🔓' : '🔒'}</button>
                            <button class="action-btn" onclick="editMap(${realIndex})" title="Edit">✏️</button>
                            <button class="action-btn" onclick="deleteMap(${realIndex})" title="Delete">🗑️</button>
                        </div>
                    </div>
                `;
            }).join('');
            
            renderPagination(totalPages);
            renderStats();
        }
        
        function renderPagination(totalPages) {
            if (totalPages <= 1) {
                document.getElementById('pagination').innerHTML = '';
                return;
            }
            
            let html = '';
            for (let i = 1; i <= Math.min(totalPages, 7); i++) {
                html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
            }
            if (totalPages > 7) {
                html += `<span style="color: #888;">...</span>`;
                html += `<button class="page-btn" onclick="goToPage(${totalPages})">${totalPages}</button>`;
            }
            document.getElementById('pagination').innerHTML = html;
        }
        
        function goToPage(page) {
            currentPage = page;
            renderTable();
        }
        
        function toggleLock(index) {
            mapsData[index].locked = !mapsData[index].locked;
            saveData();
            renderTable();
            showToast(`${mapsData[index].name} ${mapsData[index].locked ? 'dikunci 🔒' : 'dibuka 🔓'}`);
        }
        
        function deleteMap(index) {
            if (confirm(`Yakin ingin menghapus map:\n\n  ${mapsData[index].name}`)) {
                mapsData.splice(index, 1);
                saveData();
                renderTable();
                showToast('Map berhasil dihapus');
            }
        }
        
        function editMap(index) {
            editIndex = index;
            const map = mapsData[index];
            document.getElementById('mapName').value = map.name;
            document.getElementById('mapFile').value = map.url;
            document.getElementById('modalTitle').innerHTML = '✏️ Edit Map';
            document.getElementById('mapModal').classList.add('active');
        }
        
        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.style.borderLeftColor = isError ? '#ef4444' : '#22c55e';
            toast.innerHTML = isError ? `❌ ${message}` : `✅ ${message}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Modal functions
        function openAddModal() {
            editIndex = -1;
            document.getElementById('mapName').value = '';
            document.getElementById('mapFile').value = '';
            document.getElementById('fileInfo').innerHTML = '';
            document.getElementById('modalTitle').innerHTML = '＋ Tambah Map Baru';
            selectedZipFile = null;
            document.getElementById('mapModal').classList.add('active');
        }
        
        function saveMap() {
            const name = document.getElementById('mapName').value.trim();
            let file = document.getElementById('mapFile').value.trim();
            
            if (!name) {
                showToast('Nama map tidak boleh kosong!', true);
                return;
            }
            
            if (!file) {
                showToast('Nama file tidak boleh kosong!', true);
                return;
            }
            
            if (!file.endsWith('.json')) file += '.json';
            
            if (editIndex === -1) {
                // Add new
                mapsData.push({ name, url: file, locked: false });
                showToast(`'${name}' berhasil ditambahkan`);
            } else {
                // Edit
                mapsData[editIndex] = { ...mapsData[editIndex], name, url: file };
                showToast(`'${name}' berhasil diupdate`);
            }
            
            saveData();
            document.getElementById('mapModal').classList.remove('active');
            renderTable();
        }
        
        // Cleanup orphaned files
        function openCleanupModal() {
            const allFiles = getAllJsonFiles();
            const trackedFiles = mapsData.map(m => m.url);
            const orphaned = allFiles.filter(f => !trackedFiles.includes(f));
            
            if (orphaned.length === 0) {
                showToast('Tidak ada file orphaned!');
                return;
            }
            
            document.getElementById('orphanedList').innerHTML = orphaned.map(f => 
                `<div style="padding: 8px; margin: 4px 0; background: #1a1a26; border-radius: 6px;">
                    <input type="checkbox" class="orphaned-checkbox" value="${escapeHtml(f)}" checked> 
                    ${escapeHtml(f)}
                </div>`
            ).join('');
            
            document.getElementById('cleanupModal').classList.add('active');
        }
        
        function getAllJsonFiles() {
            // Simulasi file JSON yang ada di storage
            const savedFiles = localStorage.getItem('byokuxmon_orphaned');
            if (savedFiles) return JSON.parse(savedFiles);
            
            // Default orphaned files
            const defaultOrphaned = ['old_map.json', 'test_data.json', 'backup_map.json'];
            localStorage.setItem('byokuxmon_orphaned', JSON.stringify(defaultOrphaned));
            return defaultOrphaned;
        }
        
        function confirmCleanup() {
            const checkboxes = document.querySelectorAll('.orphaned-checkbox:checked');
            const toDelete = Array.from(checkboxes).map(cb => cb.value);
            
            if (toDelete.length === 0) {
                showToast('Tidak ada file yang dipilih', true);
                return;
            }
            
            // Update orphaned list
            let currentOrphaned = getAllJsonFiles();
            currentOrphaned = currentOrphaned.filter(f => !toDelete.includes(f));
            localStorage.setItem('byokuxmon_orphaned', JSON.stringify(currentOrphaned));
            
            showToast(`${toDelete.length} file berhasil dihapus`);
            document.getElementById('cleanupModal').classList.remove('active');
        }
        
        // Drag & Drop ZIP handling
        function setupDragDrop() {
            const dropzone = document.getElementById('dropzone');
            if (!dropzone) return;
            
            dropzone.addEventListener('click', () => {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = '.zip';
                input.onchange = (e) => handleZipFile(e.target.files[0]);
                input.click();
            });
            
            dropzone.addEventListener('dragover', (e) => {
                e.preventDefault();
                dropzone.style.borderColor = '#cc0000';
            });
            
            dropzone.addEventListener('dragleave', () => {
                dropzone.style.borderColor = '#2a1a2a';
            });
            
            dropzone.addEventListener('drop', (e) => {
                e.preventDefault();
                dropzone.style.borderColor = '#2a1a2a';
                const file = e.dataTransfer.files[0];
                if (file && file.name.endsWith('.zip')) {
                    handleZipFile(file);
                } else {
                    showToast('Hanya file .zip yang diterima!', true);
                }
            });
        }
        
        function handleZipFile(file) {
            if (!file || !file.name.endsWith('.zip')) {
                showToast('Hanya file .zip yang diterima!', true);
                return;
            }
            
            selectedZipFile = file;
            document.getElementById('fileInfo').innerHTML = `✅ ${file.name} (${(file.size / 1024).toFixed(2)} KB) siap diupload`;
            
            // Simulasi ekstrak JSON dari ZIP
            const progressBar = document.getElementById('progressBar');
            const progressFill = document.getElementById('progressFill');
            progressBar.style.display = 'block';
            
            let progress = 0;
            const interval = setInterval(() => {
                progress += 20;
                progressFill.style.width = progress + '%';
                if (progress >= 100) {
                    clearInterval(interval);
                    setTimeout(() => {
                        progressBar.style.display = 'none';
                        progressFill.style.width = '0%';
                        // Simulasi dapat nama file dari ZIP
                        const jsonName = file.name.replace('.zip', '.json');
                        document.getElementById('mapFile').value = jsonName;
                        showToast(`File JSON "${jsonName}" berhasil diekstrak!`);
                    }, 300);
                }
            }, 200);
        }
        
        // Event listeners
        function initEventListeners() {
            document.getElementById('addMapBtn').onclick = openAddModal;
            document.getElementById('cleanupBtn').onclick = openCleanupModal;
            document.getElementById('cancelModalBtn').onclick = () => document.getElementById('mapModal').classList.remove('active');
            document.getElementById('cancelCleanupBtn').onclick = () => document.getElementById('cleanupModal').classList.remove('active');
            document.getElementById('saveMapBtn').onclick = saveMap;
            document.getElementById('confirmCleanupBtn').onclick = confirmCleanup;
            
            document.getElementById('searchInput').addEventListener('input', () => {
                currentPage = 1;
                renderTable();
            });
            
            document.querySelectorAll('.btn-filter').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentFilter = btn.dataset.filter;
                    currentPage = 1;
                    renderTable();
                });
            });
        }
        
        // Initialize
        loadData();
        initEventListeners();
        setupDragDrop();
    </script>
</body>
</html>
