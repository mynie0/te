<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>RullzsyHUB - Map Manager Web</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            color: #e8e8f0;
            font-family: 'Courier New', 'Consolas', monospace;
            padding: 16px;
            padding-bottom: 80px;
            min-height: 100vh;
        }

        /* Container */
        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #12121a 0%, #1a1a26 100%);
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 20px;
            border-left: 4px solid #cc0000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .header h1 {
            color: #ff3333;
            font-size: 1.6rem;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .header h1 small {
            font-size: 0.65rem;
            color: #888899;
        }

        .header p {
            color: #888899;
            margin-top: 8px;
            font-size: 0.8rem;
        }

        .status-badge {
            display: inline-block;
            background: #1a1a26;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            margin-top: 8px;
        }

        .status-badge.online {
            background: #0a2a0a;
            color: #22c55e;
        }

        /* Toolbar */
        .toolbar {
            background: #12121a;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 16px;
            display: flex;
                    flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }

        .search-box {
            flex: 1;
            min-width: 160px;
            display: flex;
            align-items: center;
            background: #0f0f1a;
            border: 1px solid #2a1a2a;
            border-radius: 8px;
            padding: 8px 12px;
        }

        .search-box span {
            margin-right: 8px;
            color: #888899;
        }

        .search-box input {
            background: none;
            border: none;
            color: #e8e8f0;
            font-family: monospace;
            font-size: 0.85rem;
            width: 100%;
            outline: none;
        }

        .filter-group {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: #1a1a26;
            color: #888899;
            border: none;
            padding: 6px 14px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-btn.active {
            background: #cc0000;
            color: white;
        }

        .btn-primary {
            background: #cc0000;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-family: monospace;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.8rem;
        }

        .btn-primary:hover {
            background: #ff3333;
            transform: scale(1.02);
        }

        .btn-secondary {
            background: #1a1a26;
            color: #e8e8f0;
            border: 1px solid #2a1a2a;
            padding: 8px 14px;
            border-radius: 8px;
            font-family: monospace;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .btn-success {
            background: #0a3a0a;
            color: #22c55e;
            border: 1px solid #22c55e;
        }

        .btn-danger {
            background: #2a0000;
            color: #ff6666;
            border: 1px solid #660000;
        }

        /* Stats */
        .stats {
            background: #12121a;
            padding: 10px 15px;
            border-radius: 10px;
            margin-bottom: 16px;
            font-size: 0.75rem;
            color: #888899;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
        }

        /* Map List */
        .map-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 20px;
        }

        .map-card {
            background: #1a1a26;
            border-radius: 12px;
            padding: 14px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
            transition: all 0.2s;
            border-left: 3px solid #cc0000;
        }

        .map-card.locked {
            border-left-color: #f59e0b;
            opacity: 0.9;
        }

        .map-number {
            background: #0a0a0f;
            padding: 5px 10px;
            border-radius: 8px;
            font-size: 0.75rem;
            color: #888899;
            font-weight: bold;
            min-width: 45px;
            text-align: center;
        }

        .map-info {
            flex: 2;
            min-width: 140px;
        }

        .map-name {
            font-size: 0.95rem;
            font-weight: bold;
            margin-bottom: 4px;
            word-break: break-word;
        }

        .map-name.locked-name {
            color: #f59e0b;
        }

        .map-file {
            font-size: 0.65rem;
            color: #888899;
            font-family: monospace;
            word-break: break-all;
        }

        .map-status {
            min-width: 90px;
        }

        .status-badge-map {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
        }

        .status-unlocked {
            background: #0a2a0a;
            color: #22c55e;
        }

        .status-locked {
            background: #2a1a00;
            color: #f59e0b;
        }

        .map-actions {
            display: flex;
            gap: 6px;
        }

        .icon-btn {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 5px 8px;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .icon-btn:hover {
            background: #2a0a0a;
            transform: scale(1.05);
        }

        .icon-btn.lock {
            color: #f59e0b;
        }

        .icon-btn.unlock {
            color: #22c55e;
        }

        .icon-btn.edit {
            color: #ff6666;
        }

        .icon-btn.delete {
            color: #ef4444;
        }

        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 6px;
            flex-wrap: wrap;
            margin-top: 16px;
        }

        .page-btn {
            background: #1a1a26;
            border: none;
            color: #e8e8f0;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-family: monospace;
            font-size: 0.8rem;
        }

        .page-btn.active {
            background: #cc0000;
        }

        .page-btn:hover {
            background: #2a1a2a;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(4px);
        }

        .modal-content {
            background: #12121a;
            margin: 60px auto;
            padding: 0;
            width: 90%;
            max-width: 500px;
            border-radius: 16px;
            border: 1px solid #2a1a2a;
            animation: modalSlide 0.3s ease;
        }

        @keyframes modalSlide {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            padding: 16px 20px;
            border-bottom: 1px solid #2a1a2a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h3 {
            color: #ff3333;
        }

        .close {
            color: #888899;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }

        .close:hover {
            color: #ff3333;
        }

        .modal-body {
            padding: 20px;
        }

        .modal-body label {
            display: block;
            margin-bottom: 6px;
            color: #888899;
            font-size: 0.8rem;
        }

        .modal-body input, .modal-body textarea {
            width: 100%;
            padding: 10px;
            background: #0f0f1a;
            border: 1px solid #2a1a2a;
            border-radius: 8px;
            color: #e8e8f0;
            font-family: monospace;
            margin-bottom: 16px;
        }

        .modal-body textarea {
            resize: vertical;
            min-height: 80px;
        }

        .modal-footer {
            padding: 16px 20px;
            border-top: 1px solid #2a1a2a;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
            color: #888899;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a1a26;
            color: #22c55e;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 0.8rem;
            z-index: 1100;
            animation: fadeInUp 0.3s ease;
            border-left: 3px solid #22c55e;
        }

        .toast.error {
            border-left-color: #ef4444;
            color: #ef4444;
        }

        @keyframes fadeInUp {
            from {
                transform: translate(-50%, 20px);
                opacity: 0;
            }
            to {
                transform: translate(-50%, 0);
                opacity: 1;
            }
        }

        /* Token input */
        .token-section {
            background: #1a1a26;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 16px;
        }

        .token-input-group {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        .token-input-group input {
            flex: 1;
            padding: 8px;
            background: #0f0f1a;
            border: 1px solid #2a1a2a;
            border-radius: 6px;
            color: #e8e8f0;
            font-family: monospace;
            font-size: 0.7rem;
        }

        /* Responsive */
        @media (max-width: 600px) {
            body {
                padding: 10px;
            }
            
            .map-card {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .map-actions {
                align-self: flex-end;
            }
            
            .toolbar {
                flex-direction: column;
            }
            
            .search-box {
                width: 100%;
            }
            
            .filter-group {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>
                ⬡ RULLZSYHUB
                <small>WEB v2.0</small>
            </h1>
            <p>Map Manager | Kelola map & sinkronisasi dengan GitHub</p>
            <div class="status-badge online" id="connectionStatus">🟢 Online Mode</div>
        </div>

        <!-- Token Section (Wajib untuk push ke GitHub) -->
        <div class="token-section">
            <div style="font-size: 0.75rem; color: #888899; margin-bottom: 6px;">
                🔑 GitHub Token (diperlukan untuk push)
            </div>
            <div class="token-input-group">
                <input type="password" id="githubToken" placeholder="Masukkan GitHub Personal Access Token...">
                <button class="btn-secondary" id="saveTokenBtn" style="padding: 8px 12px;">💾 Simpan</button>
            </div>
            <div style="font-size: 0.65rem; color: #555566; margin-top: 6px;">
                Token disimpan di localStorage browser. <a href="#" id="tokenGuide" style="color: #cc0000;">Cara dapat token →</a>
            </div>
        </div>

        <!-- Toolbar -->
        <div class="toolbar">
            <div class="search-box">
                <span>🔍</span>
                <input type="text" id="searchInput" placeholder="Cari map...">
            </div>
            
            <div class="filter-group">
                <button class="filter-btn active" data-filter="all">Semua</button>
                <button class="filter-btn" data-filter="unlocked">🔓 Unlocked</button>
                <button class="filter-btn" data-filter="locked">🔒 Locked</button>
            </div>
            
            <button class="btn-primary" id="addBtn">➕ Tambah Map</button>
            <button class="btn-primary" id="pullBtn" style="background: #1a472a;">📥 Pull</button>
            <button class="btn-secondary" id="applyBtn">⬆ Push ke GitHub</button>
        </div>

        <!-- Stats -->
        <div class="stats" id="stats">
            <span id="statsText">Memuat data...</span>
            <span id="lastSync"></span>
        </div>

        <!-- Map List -->
        <div class="map-list" id="mapList">
            <div class="loading">📡 Memuat daftar map...</div>
        </div>

        <!-- Pagination -->
        <div class="pagination" id="pagination"></div>
    </div>

    <!-- Modal Add/Edit -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Tambah Map Baru</h3>
                <span class="close" id="closeModal">&times;</span>
            </div>
            <div class="modal-body">
                <label>📛 Nama Map</label>
                <input type="text" id="mapName" placeholder="Contoh: Autumn Valley">
                
                <label>📁 Nama File (.json)</label>
                <input type="text" id="mapFile" placeholder="autumn_valley.json">
                
                <label>🔗 URL Lengkap (Opsional)</label>
                <input type="text" id="mapUrl" placeholder="https://raw.githubusercontent.com/.../file.json">
                
                <label>🔒 Status</label>
                <select id="mapLocked" style="width: 100%; padding: 10px; background: #0f0f1a; border: 1px solid #2a1a2a; border-radius: 8px; color: #e8e8f0;">
                    <option value="false">🔓 Unlocked</option>
                    <option value="true">🔒 Locked (Maintenance)</option>
                </select>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" id="cancelModalBtn">Batal</button>
                <button class="btn-primary" id="saveMapBtn">Simpan</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== KONFIGURASI ====================
        const REPO_OWNER = "BD16-XD";
        const REPO_NAME = "VIP-LOGIC-KOK-NYOLONG";
        const FILE_PATH = "list_map.json";
        const BRANCH = "main";

        let mapsData = { maps: [] };
        let currentPage = 1;
        let currentFilter = "all";
        let currentSearch = "";
        let editIndex = null;
        let ITEMS_PER_PAGE = 10;

        // ==================== FUNGSI UTILITY ====================
        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.className = 'toast' + (isError ? ' error' : '');
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function getGitHubToken() {
            return localStorage.getItem('github_token');
        }

        function saveGitHubToken(token) {
            if (token) {
                localStorage.setItem('github_token', token);
                showToast('✅ Token disimpan!');
            } else {
                localStorage.removeItem('github_token');
            }
        }

        // ==================== GITHUB API ====================
        async function getFileSha() {
            const token = getGitHubToken();
            if (!token) return null;
            
            try {
                const response = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`, {
                    headers: {
                        'Authorization': `token ${token}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    return data.sha;
                }
                return null;
            } catch (error) {
                console.error('Error getting SHA:', error);
                return null;
            }
        }

        async function pullFromGitHub() {
            showToast('📥 Mengambil data dari GitHub...');
            
            const token = getGitHubToken();
            const headers = token ? { 'Authorization': `token ${token}` } : {};
            
            try {
                const response = await fetch(`https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/${BRANCH}/${FILE_PATH}`);
                
                if (response.ok) {
                    const data = await response.json();
                    mapsData = data;
                    if (!mapsData.maps) mapsData.maps = [];
                    
                    localStorage.setItem('maps_backup', JSON.stringify(mapsData));
                    showToast('✅ Data berhasil diambil dari GitHub!');
                    currentPage = 1;
                    renderMapList();
                    updateStats();
                    return true;
                } else {
                    // Fallback ke local storage
                    const backup = localStorage.getItem('maps_backup');
                    if (backup) {
                        mapsData = JSON.parse(backup);
                        showToast('⚠️ Gagal pull, menggunakan data lokal', true);
                    } else {
                        mapsData = { maps: [] };
                        showToast('❌ Gagal pull dari GitHub', true);
                    }
                    renderMapList();
                    updateStats();
                    return false;
                }
            } catch (error) {
                console.error('Pull error:', error);
                const backup = localStorage.getItem('maps_backup');
                if (backup) {
                    mapsData = JSON.parse(backup);
                    showToast('⚠️ Error network, menggunakan data lokal', true);
                } else {
                    mapsData = { maps: [] };
                }
                renderMapList();
                updateStats();
                return false;
            }
        }

        async function pushToGitHub(commitMessage = "Update list_map.json via Web") {
            const token = getGitHubToken();
            if (!token) {
                showToast('❌ Masukkan GitHub Token terlebih dahulu!', true);
                return false;
            }

            showToast('⬆ Mengirim ke GitHub...');
            
            try {
                // Dapatkan SHA file
                const sha = await getFileSha();
                
                // Encode content ke base64
                const content = btoa(unescape(encodeURIComponent(JSON.stringify(mapsData, null, 2)));
                
                const response = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${token}`,
                        'Content-Type': 'application/json',
                        'Accept': 'application/vnd.github.v3+json'
                    },
                    body: JSON.stringify({
                        message: commitMessage,
                        content: content,
                        sha: sha,
                        branch: BRANCH
                    })
                });
                
                if (response.ok) {
                    // Backup ke local
                    localStorage.setItem('maps_backup', JSON.stringify(mapsData));
                    showToast('✅ Berhasil push ke GitHub!');
                    updateLastSync();
                    return true;
                } else {
                    const error = await response.json();
                    showToast(`❌ Push gagal: ${error.message}`, true);
                    return false;
                }
            } catch (error) {
                console.error('Push error:', error);
                showToast(`❌ Error: ${error.message}`, true);
                return false;
            }
        }

        // ==================== FUNGSI MAP ====================
        function addMap(name, filename, url, locked) {
            if (!name || !filename) {
                showToast('Nama dan file harus diisi!', true);
                return false;
            }
            
            if (!filename.endsWith('.json')) filename += '.json';
            
            const fullUrl = url || `https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/${BRANCH}/${filename}`;
            
            mapsData.maps.push({
                name: name,
                url: fullUrl,
                locked: locked === true || locked === 'true'
            });
            
            localStorage.setItem('maps_backup', JSON.stringify(mapsData));
            showToast(`✅ Map "${name}" ditambahkan (belum push ke GitHub)`);
            renderMapList();
            updateStats();
            return true;
        }

        function updateMap(index, name, filename, url, locked) {
            if (!name || !filename) {
                showToast('Nama dan file harus diisi!', true);
                return false;
            }
            
            if (!filename.endsWith('.json')) filename += '.json';
            
            const fullUrl = url || `https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/${BRANCH}/${filename}`;
            
            mapsData.maps[index] = {
                name: name,
                url: fullUrl,
                locked: locked === true || locked === 'true'
            };
            
            localStorage.setItem('maps_backup', JSON.stringify(mapsData));
            showToast(`✅ Map "${name}" diupdate (belum push ke GitHub)`);
            renderMapList();
            updateStats();
            return true;
        }

        function deleteMap(index) {
            const mapName = mapsData.maps[index].name;
            if (confirm(`Yakin hapus map "${mapName}"?`)) {
                mapsData.maps.splice(index, 1);
                localStorage.setItem('maps_backup', JSON.stringify(mapsData));
                showToast(`🗑️ Map "${mapName}" dihapus (belum push ke GitHub)`);
                
                if (currentPage > 1 && getFilteredMaps().length <= (currentPage - 1) * ITEMS_PER_PAGE) {
                    currentPage--;
                }
                renderMapList();
                updateStats();
            }
        }

        function toggleLock(index) {
            const map = mapsData.maps[index];
            map.locked = !map.locked;
            localStorage.setItem('maps_backup', JSON.stringify(mapsData));
            showToast(`${map.locked ? '🔒' : '🔓'} "${map.name}" ${map.locked ? 'dikunci' : 'dibuka'}`);
            renderMapList();
            updateStats();
        }

        // ==================== FILTER & SEARCH ====================
        function getFilteredMaps() {
            let filtered = [...mapsData.maps];
            
            // Filter berdasarkan status
            if (currentFilter === 'unlocked') {
                filtered = filtered.filter(m => !m.locked);
            } else if (currentFilter === 'locked') {
                filtered = filtered.filter(m => m.locked);
            }
            
            // Search berdasarkan nama
            if (currentSearch) {
                const searchLower = currentSearch.toLowerCase();
                filtered = filtered.filter(m => 
                    m.name.toLowerCase().includes(searchLower) || 
                    m.url.toLowerCase().includes(searchLower)
                );
            }
            
            return filtered;
        }

        // ==================== RENDER UI ====================
        function renderMapList() {
            const filtered = getFilteredMaps();
            const totalPages = Math.ceil(filtered.length / ITEMS_PER_PAGE);
            
            if (currentPage > totalPages) currentPage = Math.max(1, totalPages);
            
            const start = (currentPage - 1) * ITEMS_PER_PAGE;
            const pageMaps = filtered.slice(start, start + ITEMS_PER_PAGE);
            
            const container = document.getElementById('mapList');
            
            if (pageMaps.length === 0) {
                container.innerHTML = '<div class="loading">📭 Tidak ada map ditemukan</div>';
                return;
            }
            
            container.innerHTML = pageMaps.map((map, idx) => {
                const globalIndex = mapsData.maps.findIndex(m => m.name === map.name && m.url === map.url);
                const displayNo = start + idx + 1;
                const filename = map.url.split('/').pop();
                const isLocked = map.locked;
                
                return `
                    <div class="map-card ${isLocked ? 'locked' : ''}">
                        <div class="map-number">#${displayNo}</div>
                        <div class="map-info">
                            <div class="map-name ${isLocked ? 'locked-name' : ''}">${escapeHtml(map.name)}</div>
                            <div class="map-file">📄 ${escapeHtml(filename)}</div>
                        </div>
                        <div class="map-status">
                            <span class="status-badge-map ${isLocked ? 'status-locked' : 'status-unlocked'}">
                                ${isLocked ? '🔒 LOCKED' : '🔓 UNLOCKED'}
                            </span>
                        </div>
                        <div class="map-actions">
                            <button class="icon-btn ${isLocked ? 'unlock' : 'lock'}" onclick="toggleLock(${globalIndex})" title="${isLocked ? 'Buka kunci' : 'Kunci'}">
                                ${isLocked ? '🔓' : '🔒'}
                            </button>
                            <button class="icon-btn edit" onclick="openEditModal(${globalIndex})" title="Edit">✏️</button>
                            <button class="icon-btn delete" onclick="deleteMap(${globalIndex})" title="Hapus">🗑️</button>
                        </div>
                    </div>
                `;
            }).join('');
            
            renderPagination(totalPages);
        }

        function renderPagination(totalPages) {
            const container = document.getElementById('pagination');
            if (totalPages <= 1) {
                container.innerHTML = '';
                return;
            }
            
            let html = '';
            
            // Prev
            if (currentPage > 1) {
                html += `<button class="page-btn" onclick="goToPage(${currentPage - 1})">◀</button>`;
            }
            
            // Page numbers
            let startPage = Math.max(1, currentPage - 2);
            let endPage = Math.min(totalPages, startPage + 4);
            
            for (let i = startPage; i <= endPage; i++) {
                html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
            }
            
            // Next
            if (currentPage < totalPages) {
                html += `<button class="page-btn" onclick="goToPage(${currentPage + 1})">▶</button>`;
            }
            
            container.innerHTML = html;
        }

        function updateStats() {
            const total = mapsData.maps.length;
            const unlocked = mapsData.maps.filter(m => !m.locked).length;
            const locked = mapsData.maps.filter(m => m.locked).length;
            
            document.getElementById('statsText').innerHTML = `📊 Total: ${total} | 🔓 Unlocked: ${unlocked} | 🔒 Locked: ${locked}`;
        }

        function updateLastSync() {
            const now = new Date();
            document.getElementById('lastSync').innerHTML = `🕐 Last sync: ${now.toLocaleTimeString()}`;
        }

        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // ==================== MODAL ====================
        function openAddModal() {
            editIndex = null;
            document.getElementById('modalTitle').innerText = '➕ Tambah Map Baru';
            document.getElementById('mapName').value = '';
            document.getElementById('mapFile').value = '';
            document.getElementById('mapUrl').value = '';
            document.getElementById('mapLocked').value = 'false';
            document.getElementById('modal').style.display = 'block';
        }

        function openEditModal(index) {
            editIndex = index;
            const map = mapsData.maps[index];
            const filename = map.url.split('/').pop();
            
            document.getElementById('modalTitle').innerText = '✏️ Edit Map';
            document.getElementById('mapName').value = map.name;
            document.getElementById('mapFile').value = filename;
            document.getElementById('mapUrl').value = map.url;
            document.getElementById('mapLocked').value = map.locked ? 'true' : 'false';
            document.getElementById('modal').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
            editIndex = null;
        }

        function saveMap() {
            const name = document.getElementById('mapName').value.trim();
            const file = document.getElementById('mapFile').value.trim();
            const url = document.getElementById('mapUrl').value.trim();
            const locked = document.getElementById('mapLocked').value === 'true';
            
            if (editIndex !== null) {
                updateMap(editIndex, name, file, url, locked);
            } else {
                addMap(name, file, url, locked);
            }
            
            closeModal();
        }

        function goToPage(page) {
            currentPage = page;
            renderMapList();
        }

        // ==================== EVENT LISTENER & INIT ====================
        function init() {
            // Load dari local storage dulu
            const backup = localStorage.getItem('maps_backup');
            if (backup) {
                mapsData = JSON.parse(backup);
                if (!mapsData.maps) mapsData.maps = [];
            } else {
                mapsData = { maps: [] };
            }
            
            // Load token
            const savedToken = getGitHubToken();
            if (savedToken) {
                document.getElementById('githubToken').value = '••••••••••••••••';
            }
            
            renderMapList();
            updateStats();
            
            // Pull data dari GitHub otomatis
            setTimeout(() => {
                pullFromGitHub();
            }, 500);
        }

        // Event listeners
        document.getElementById('addBtn').onclick = openAddModal;
        document.getElementById('applyBtn').onclick = () => pushToGitHub('Update maps from RullzsyHUB Web');
        document.getElementById('pullBtn').onclick = pullFromGitHub;
        document.getElementById('closeModal').onclick = closeModal;
        document.getElementById('cancelModalBtn').onclick = closeModal;
        document.getElementById('saveMapBtn').onclick = saveMap;
        
        document.getElementById('saveTokenBtn').onclick = () => {
            const token = document.getElementById('githubToken').value;
            if (token && token !== '••••••••••••••••') {
                saveGitHubToken(token);
                document.getElementById('githubToken').value = '••••••••••••••••';
            } else if (!token) {
                saveGitHubToken('');
                showToast('Token dihapus!');
            }
        };
        
        document.getElementById('tokenGuide').onclick = (e) => {
            e.preventDefault();
            window.open('https://github.com/settings/tokens', '_blank');
            showToast('Buat token baru dengan repo scope');
        };
        
        document.getElementById('searchInput').oninput = (e) => {
            currentSearch = e.target.value;
            currentPage = 1;
            renderMapList();
        };
        
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                currentPage = 1;
                renderMapList();
            };
        });
        
        window.onclick = (e) => {
            if (e.target === document.getElementById('modal')) {
                closeModal();
            }
        };
        
        // Expose functions ke global
        window.toggleLock = toggleLock;
        window.deleteMap = deleteMap;
        window.openEditModal = openEditModal;
        window.goToPage = goToPage;
        
        init();
    </script>
</body>
    </html>
