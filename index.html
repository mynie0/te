<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RobloxScriptHub</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #050510;
    --bg2: #080820;
    --card: #0d0d2b;
    --neon-pink: #ff2d78;
    --neon-cyan: #00f5ff;
    --neon-green: #39ff14;
    --neon-purple: #bf00ff;
    --neon-yellow: #ffe600;
    --text: #e0e0ff;
    --muted: #6060aa;
    --border: rgba(0,245,255,0.15);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(0,245,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,245,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px);
    pointer-events: none;
    z-index: 0;
  }

  .container { max-width: 1100px; margin: 0 auto; padding: 0 20px; position: relative; z-index: 1; }

  header {
    padding: 32px 0 24px;
    border-bottom: 1px solid var(--border);
    position: relative;
  }
  .header-inner {
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px;
  }
  .logo {
    font-family: 'Orbitron', monospace;
    font-size: 1.7rem; font-weight: 900;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .logo span:nth-child(1) { color: var(--neon-cyan); text-shadow: 0 0 18px var(--neon-cyan), 0 0 40px var(--neon-cyan); }
  .logo span:nth-child(2) { color: var(--neon-pink); text-shadow: 0 0 18px var(--neon-pink), 0 0 40px var(--neon-pink); }
  .logo span:nth-child(3) { color: var(--neon-green); text-shadow: 0 0 18px var(--neon-green); }
  .logo-sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
    letter-spacing: 4px;
    margin-top: 2px;
  }
  .badge {
    background: linear-gradient(135deg, var(--neon-purple), var(--neon-pink));
    color: #fff;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    padding: 4px 12px;
    border-radius: 20px;
    letter-spacing: 1px;
    box-shadow: 0 0 18px rgba(191,0,255,0.5);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.7} }

  /* ADMIN BUTTON */
  .admin-btn {
    background: linear-gradient(135deg, var(--neon-pink), var(--neon-purple));
    border: none;
    color: white;
    font-family: 'Orbitron', monospace;
    font-size: 0.75rem;
    padding: 8px 20px;
    border-radius: 30px;
    cursor: pointer;
    transition: all 0.3s;
    font-weight: bold;
  }
  .admin-btn:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(255,45,120,0.5); }

  .search-wrap {
    margin: 32px 0 28px;
    position: relative;
  }
  .search-icon {
    position: absolute; left: 18px; top: 50%; transform: translateY(-50%);
    color: var(--neon-cyan); font-size: 1rem; pointer-events: none;
  }
  #searchInput {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 18px 14px 46px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.95rem;
    color: var(--text);
    outline: none;
    transition: border 0.2s, box-shadow 0.2s;
  }
  #searchInput:focus {
    border-color: var(--neon-cyan);
    box-shadow: 0 0 16px rgba(0,245,255,0.2);
  }
  #searchInput::placeholder { color: var(--muted); }

  .filter-tabs {
    display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 28px;
  }
  .tab {
    font-family: 'Orbitron', monospace;
    font-size: 0.72rem;
    padding: 7px 18px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 1px;
  }
  .tab:hover { color: var(--text); border-color: var(--neon-cyan); }
  .tab.active {
    background: rgba(0,245,255,0.1);
    border-color: var(--neon-cyan);
    color: var(--neon-cyan);
    box-shadow: 0 0 12px rgba(0,245,255,0.2);
  }

  .stats {
    display: flex; gap: 24px; margin-bottom: 32px; flex-wrap: wrap;
  }
  .stat {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.78rem;
    color: var(--muted);
  }
  .stat b { color: var(--neon-yellow); font-size: 1rem; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 20px;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 22px;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
    animation: fadeIn 0.4s ease both;
  }
  .card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--neon-cyan), var(--neon-pink), var(--neon-purple));
    opacity: 0.7;
  }
  .card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 20px rgba(0,245,255,0.1);
    border-color: rgba(0,245,255,0.3);
  }
  @keyframes fadeIn { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:none} }

  .card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 10px; }
  .card-title {
    font-family: 'Orbitron', monospace;
    font-size: 0.92rem;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.5px;
  }
  .card-tag {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    padding: 3px 10px;
    border-radius: 20px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .tag-free { background: rgba(57,255,20,0.12); color: var(--neon-green); border: 1px solid rgba(57,255,20,0.3); }
  .tag-keyless { background: rgba(0,245,255,0.12); color: var(--neon-cyan); border: 1px solid rgba(0,245,255,0.3); }
  .tag-paid { background: rgba(255,230,0,0.12); color: var(--neon-yellow); border: 1px solid rgba(255,230,0,0.3); }

  .card-game {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.72rem;
    color: var(--neon-purple);
    margin-bottom: 8px;
    letter-spacing: 1px;
  }
  .card-desc {
    font-size: 0.88rem;
    color: #9090cc;
    line-height: 1.5;
    margin-bottom: 16px;
  }
  .card-features {
    display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 18px;
  }
  .feat {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    padding: 3px 9px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 4px;
    color: #8080bb;
  }

  .card-actions { display: flex; gap: 10px; }
  .btn {
    flex: 1;
    font-family: 'Orbitron', monospace;
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 9px 12px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .btn-copy {
    background: rgba(0,245,255,0.1);
    border: 1px solid var(--neon-cyan);
    color: var(--neon-cyan);
  }
  .btn-copy:hover {
    background: rgba(0,245,255,0.2);
    box-shadow: 0 0 16px rgba(0,245,255,0.3);
  }
  .btn.copied {
    background: rgba(57,255,20,0.15);
    border-color: var(--neon-green);
    color: var(--neon-green);
  }

  .empty {
    grid-column: 1/-1;
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-family: 'Share Tech Mono', monospace;
  }
  .empty-icon { font-size: 2.5rem; margin-bottom: 12px; }

  footer {
    margin-top: 60px;
    padding: 24px 0;
    border-top: 1px solid var(--border);
    text-align: center;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
    letter-spacing: 2px;
  }
  footer span { color: var(--neon-cyan); }

  /* MODAL STYLES - Custom Login & Admin */
  .modal-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(5,5,16,0.95);
    backdrop-filter: blur(10px);
    z-index: 1000;
    display: none;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.active { display: flex; }
  .modal-content {
    background: var(--bg2);
    border: 1px solid var(--neon-cyan);
    border-radius: 20px;
    width: 90%;
    max-width: 400px;
    padding: 30px;
    box-shadow: 0 0 40px rgba(0,245,255,0.3);
  }
  .modal-content h2 {
    color: var(--neon-cyan);
    font-family: 'Orbitron';
    text-align: center;
    margin-bottom: 20px;
  }
  .modal-content input {
    width: 100%;
    background: #0a0a1a;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 15px;
    color: white;
    font-family: 'Rajdhani';
    font-size: 1rem;
    margin-bottom: 20px;
  }
  .modal-content input:focus {
    outline: none;
    border-color: var(--neon-pink);
  }
  .modal-buttons {
    display: flex;
    gap: 12px;
  }
  .modal-buttons button {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
    font-family: 'Orbitron';
    font-size: 0.8rem;
  }
  .btn-login {
    background: linear-gradient(135deg, var(--neon-green), #00aa00);
    border: none;
    color: white;
  }
  .btn-cancel {
    background: transparent;
    border: 1px solid var(--neon-pink);
    color: var(--neon-pink);
  }
  .error-msg {
    color: var(--neon-pink);
    text-align: center;
    margin-bottom: 15px;
    font-size: 0.8rem;
  }

  /* ADMIN MODAL (besar) */
  .admin-modal {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(5,5,16,0.95);
    backdrop-filter: blur(10px);
    z-index: 1000;
    display: none;
    align-items: center;
    justify-content: center;
  }
  .admin-modal.active { display: flex; }
  .admin-modal-content {
    background: var(--bg2);
    border: 1px solid var(--neon-cyan);
    border-radius: 20px;
    width: 90%;
    max-width: 800px;
    max-height: 85vh;
    overflow-y: auto;
    padding: 24px;
  }
  .admin-modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    padding-bottom: 15px;
    border-bottom: 1px solid var(--border);
  }
  .admin-modal-header h2 { color: var(--neon-cyan); font-family: 'Orbitron'; font-size: 1.2rem; }
  .close-modal { background: none; border: none; color: var(--muted); font-size: 24px; cursor: pointer; }
  .close-modal:hover { color: var(--neon-pink); }
  .form-group { margin-bottom: 18px; }
  .form-group label { display: block; margin-bottom: 6px; color: var(--neon-pink); font-family: 'Share Tech Mono'; font-size: 0.75rem; }
  .form-group input, .form-group textarea, .form-group select {
    width: 100%;
    background: #0a0a1a;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    color: white;
    font-family: 'Rajdhani';
    font-size: 0.9rem;
  }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
  .btn-submit {
    background: linear-gradient(135deg, var(--neon-green), #00aa00);
    border: none;
    padding: 12px;
    border-radius: 8px;
    color: white;
    font-weight: bold;
    cursor: pointer;
    width: 100%;
    margin-top: 10px;
  }
  .btn-danger { background: linear-gradient(135deg, var(--neon-pink), #aa0033); }
  .script-list-item {
    background: #0a0a1a;
    border-radius: 10px;
    padding: 12px;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
  }
  .icon-btn {
    background: transparent;
    border: 1px solid var(--border);
    padding: 5px 12px;
    border-radius: 6px;
    color: white;
    cursor: pointer;
    margin-left: 8px;
  }
  .icon-btn:hover { border-color: var(--neon-cyan); }
  .image-preview { max-width: 100%; max-height: 100px; border-radius: 8px; margin-top: 8px; display: none; }
  .admin-stats { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
  .admin-stat-card { background: var(--card); border-radius: 12px; padding: 15px; text-align: center; flex: 1; min-width: 100px; }
  .admin-stat-card h3 { font-size: 1.5rem; color: var(--neon-cyan); }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--neon-purple); border-radius: 3px; }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="header-inner">
      <div>
        <div class="logo">
          <span>Roblox</span><span>Script</span><span>Hub</span>
        </div>
        <div class="logo-sub">FREE SCRIPTS · KEYLESS · UPDATED</div>
      </div>
      <div style="display: flex; gap: 12px; align-items: center;">
        <div class="badge">⚡ ONLINE</div>
        <button class="admin-btn" id="adminBtn">🔐 ADMIN</button>
      </div>
    </div>
  </header>

  <div style="height:32px"></div>

  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input id="searchInput" type="text" placeholder="Search script or game..."/>
  </div>

  <div class="filter-tabs" id="filterTabs">
    <button class="tab active" data-filter="all">ALL</button>
    <button class="tab" data-filter="free">FREE</button>
    <button class="tab" data-filter="keyless">KEYLESS</button>
    <button class="tab" data-filter="paid">PAID</button>
  </div>

  <div class="stats">
    <div class="stat">Scripts: <b id="countAll">0</b></div>
    <div class="stat">Shown: <b id="countShown">0</b></div>
    <div class="stat">Last Update: <b>2025</b></div>
  </div>

  <div class="grid" id="scriptGrid"></div>
</div>

<footer>
  <div class="container">
    <span>RobloxScriptHub</span> — For educational purposes only. Use at your own risk.
  </div>
</footer>

<!-- LOGIN MODAL CUSTOM -->
<div class="modal-overlay" id="loginModal">
  <div class="modal-content">
    <h2>🔐 ADMIN LOGIN</h2>
    <div id="loginError" class="error-msg"></div>
    <input type="password" id="loginPassword" placeholder="Masukkan password admin" autocomplete="off">
    <div class="modal-buttons">
      <button class="btn-login" id="loginSubmit">LOGIN</button>
      <button class="btn-cancel" id="loginCancel">BATAL</button>
    </div>
  </div>
</div>

<!-- ADMIN PANEL MODAL -->
<div class="admin-modal" id="adminModal">
  <div class="admin-modal-content">
    <div class="admin-modal-header">
      <h2>🛠️ ADMIN CONTROL PANEL</h2>
      <button class="close-modal" id="closeAdminModal">✕</button>
    </div>
    <div id="adminBody"></div>
  </div>
</div>

<script>
// ========== DEFAULT SCRIPTS ==========
const defaultScripts = [
  {
    id: 1,
    title: "Wonder Chase V3",
    game: "WONDER CHASE OBBY",
    desc: "Auto play obby dengan portal teleportation, sticker & pickup collection, anti-replay otomatis.",
    tag: "free",
    features: ["Auto Portal", "Pickup Collect", "Anti-AFK", "Auto Replay"],
    image: "",
    code: `-- Wonder Chase V3 | RobloxScriptHub
local Players = game:GetService("Players")
local RunService = game:GetService("RunService")
local VirtualUser = game:GetService("VirtualUser")

local lp = Players.LocalPlayer
local char = lp.Character or lp.CharacterAdded:Wait()

-- Anti AFK
game:GetService("Players").LocalPlayer.Idled:Connect(function()
    VirtualUser:Button2Down(Vector2.new(0,0), workspace.CurrentCamera.CFrame)
    task.wait(1)
    VirtualUser:Button2Up(Vector2.new(0,0), workspace.CurrentCamera.CFrame)
end)

-- Auto Portal
local portalDelay = 120
getgenv().WonderChase = true

task.spawn(function()
    while getgenv().WonderChase do
        for _, portal in pairs(workspace:GetDescendants()) do
            if portal:IsA("BasePart") and portal.Name:lower():find("portal") then
                char.HumanoidRootPart.CFrame = portal.CFrame + Vector3.new(0,3,0)
                task.wait(portalDelay)
            end
        end
        task.wait(1)
    end
end)

-- Pickup Collection
task.spawn(function()
    while getgenv().WonderChase do
        for _, obj in pairs(workspace:GetDescendants()) do
            if obj:IsA("BasePart") and (obj.Name:lower():find("sticker") or obj.Name:lower():find("pickup")) then
                firetouchinterest(char.HumanoidRootPart, obj, 0)
                task.wait(0.05)
                firetouchinterest(char.HumanoidRootPart, obj, 1)
            end
        end
        task.wait(0.5)
    end
end)

print("[WonderChase V3] Loaded")`
  },
  {
    id: 2,
    title: "Orb Collector ESP",
    game: "ANY GAME (ORB)",
    desc: "Auto collect semua orb di workspace dengan ESP BillboardGui RGB, FPS booster, dan distance display.",
    tag: "keyless",
    features: ["Auto Collect", "ESP RGB", "FPS Boost", "Distance Display"],
    image: "",
    code: `-- Orb Collector ESP | RobloxScriptHub
local cfg = getgenv()
cfg.OrbESP = true
cfg.AutoCollect = true
cfg.FPSBoost = true

local Players = game:GetService("Players")
local RunService = game:GetService("RunService")
local lp = Players.LocalPlayer
local char = lp.Character or lp.CharacterAdded:Wait()
local hrp = char:WaitForChild("HumanoidRootPart")

if cfg.FPSBoost then
    settings().Rendering.QualityLevel = 1
    game:GetService("Lighting").GlobalShadows = false
    game:GetService("Lighting").FogEnd = 9e9
end

local function addESP(part)
    if part:FindFirstChild("OrbESP") then return end
    local bb = Instance.new("BillboardGui")
    bb.Name = "OrbESP"
    bb.AlwaysOnTop = true
    bb.Size = UDim2.new(0,60,0,20)
    bb.StudsOffset = Vector3.new(0,2,0)
    bb.Parent = part
    local lbl = Instance.new("TextLabel", bb)
    lbl.Size = UDim2.new(1,0,1,0)
    lbl.BackgroundTransparency = 1
    lbl.Font = Enum.Font.GothamBold
    lbl.TextSize = 13
    lbl.TextStrokeTransparency = 0
    local hue = 0
    RunService.Heartbeat:Connect(function()
        hue = (hue + 0.005) % 1
        local c = Color3.fromHSV(hue,1,1)
        lbl.TextColor3 = c
        local dist = math.floor((hrp.Position - part.Position).Magnitude)
        lbl.Text = "ORB ["..dist.."m]"
    end)
end

RunService.Heartbeat:Connect(function()
    for _, obj in pairs(workspace:GetDescendants()) do
        if obj:IsA("BasePart") and (obj.Name == "orbs" or obj.Name == "AnaRenk") then
            if cfg.OrbESP then addESP(obj) end
            if cfg.AutoCollect then
                firetouchinterest(hrp, obj, 0)
                firetouchinterest(hrp, obj, 1)
            end
        end
    end
end)

print("[OrbCollector] Loaded")`
  },
  {
    id: 3,
    title: "Checkpoint Farmer",
    game: "BADGE / OBBY GAME",
    desc: "Auto teleport ke semua checkpoint dan farming badge dengan loop otomatis. Support folder ClearStage.",
    tag: "free",
    features: ["Auto TP", "Badge Farm", "ClearStage Loop", "Anti-AFK"],
    image: "",
    code: `-- Checkpoint Farmer | RobloxScriptHub
local Players = game:GetService("Players")
local lp = Players.LocalPlayer
local char = lp.Character or lp.CharacterAdded:Wait()
local hrp = char:WaitForChild("HumanoidRootPart")

getgenv().CheckpointFarm = true

local function teleportCheckpoints()
    for i = 1, 999 do
        local folder = workspace:FindFirstChild("ClearStage"..i)
            or (workspace.Engine and workspace.Engine.Checkpoints and workspace.Engine.Checkpoints:FindFirstChild(tostring(i)))
        if folder then
            local part = folder:IsA("BasePart") and folder or folder:FindFirstChildWhichIsA("BasePart")
            if part then
                hrp.CFrame = part.CFrame + Vector3.new(0,4,0)
                task.wait(0.3)
            end
        end
    end
end

task.spawn(function()
    while getgenv().CheckpointFarm do
        teleportCheckpoints()
        task.wait(1)
    end
end)

print("[CheckpointFarmer] Running")`
  },
  {
    id: 4,
    title: "Inf Point Clicker",
    game: "ECLIPSE JOIN & CLAIM",
    desc: "Toggle Infinite Point yang fire AddPoint:FireServer() dan set WalkSpeed via RunService Heartbeat.",
    tag: "keyless",
    features: ["Inf Points", "WalkSpeed", "Toggle", "Heartbeat Loop"],
    image: "",
    code: `-- Inf Point | RobloxScriptHub
local RunService = game:GetService("RunService")
local Players = game:GetService("Players")

let scripts = [];
let activeFilter = 'all';
let searchQuery = '';
let isAdmin = false;

// Load data
function loadData() {
  const stored = localStorage.getItem('RBSH_Scripts');
  if (stored) {
    try {
      scripts = JSON.parse(stored);
      if (!Array.isArray(scripts)) throw new Error();
    } catch(e) { scripts = JSON.parse(JSON.stringify(defaultScripts)); }
  } else {
    scripts = JSON.parse(JSON.stringify(defaultScripts));
  }
  saveData();
}

function saveData() {
  localStorage.setItem('RBSH_Scripts', JSON.stringify(scripts));
}

// Cek session admin
function checkAdminSession() {
  const session = localStorage.getItem('RBSH_Admin');
  if (session === 'true') {
    isAdmin = true;
    document.getElementById('adminBtn').innerHTML = '👑 ADMIN';
    document.getElementById('adminBtn').style.background = "linear-gradient(135deg, #39ff14, #00aa00)";
  } else {
    isAdmin = false;
    document.getElementById('adminBtn').innerHTML = '🔐 ADMIN';
    document.getElementById('adminBtn').style.background = "linear-gradient(135deg, #ff2d78, #bf00ff)";
  }
}

function setAdmin(value) {
  isAdmin = value;
  localStorage.setItem('RBSH_Admin', value);
  if (value) {
    document.getElementById('adminBtn').innerHTML = '👑 ADMIN';
    document.getElementById('adminBtn').style.background = "linear-gradient(135deg, #39ff14, #00aa00)";
  } else {
    document.getElementById('adminBtn').innerHTML = '🔐 ADMIN';
    document.getElementById('adminBtn').style.background = "linear-gradient(135deg, #ff2d78, #bf00ff)";
  }
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/[&<>]/g, function(m) {
    if (m === '&') return '&amp;';
    if (m === '<') return '&lt;';
    if (m === '>') return '&gt;';
    return m;
  });
}

function getTagClass(tag) {
  if (tag === 'free') return 'tag-free';
  if (tag === 'keyless') return 'tag-keyless';
  return 'tag-paid';
}

// RENDER GRID
function renderGrid() {
  const grid = document.getElementById('scriptGrid');
  const q = searchQuery.toLowerCase();
  const filtered = scripts.filter(s => {
    if (activeFilter !== 'all' && s.tag !== activeFilter) return false;
    if (q && !s.title.toLowerCase().includes(q) && !s.game.toLowerCase().includes(q) && !s.desc.toLowerCase().includes(q)) return false;
    return true;
  });
  
  document.getElementById('countAll').innerText = scripts.length;
  document.getElementById('countShown').innerText = filtered.length;
  
  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div>No scripts found for "<b>${escapeHtml(searchQuery)}</b>"</div>`;
    return;
  }
  
  grid.innerHTML = filtered.map((s, idx) => {
    const realIdx = scripts.findIndex(orig => orig.id === s.id);
    return `
      <div class="card">
        ${s.image ? `<img src="${escapeHtml(s.image)}" style="width:100%; height:120px; object-fit:cover; border-radius:8px; margin-bottom:12px;" onerror="this.style.display='none'">` : ''}
        <div class="card-header">
          <div class="card-title">${escapeHtml(s.title)}</div>
          <div class="card-tag ${getTagClass(s.tag)}">${s.tag.toUpperCase()}</div>
        </div>
        <div class="card-game">📁 ${escapeHtml(s.game)}</div>
        <div class="card-desc">${escapeHtml(s.desc)}</div>
        <div class="card-features">
          ${s.features.map(f => `<span class="feat">${escapeHtml(f)}</span>`).join('')}
        </div>
        <div class="card-actions">
          <button class="btn btn-copy" onclick="copyScript(${realIdx}, this)">⎘ COPY</button>
        </div>
      </div>
    `;
  }).join('');
}

// COPY FUNCTION
window.copyScript = function(idx, btn) {
  navigator.clipboard.writeText(scripts[idx].code).then(() => {
    btn.innerHTML = '✓ COPIED';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.innerHTML = '⎘ COPY';
      btn.classList.remove('copied');
    }, 1800);
  }).catch(() => {
    alert('Gagal copy!');
  });
};

// ========== LOGIN MODAL CUSTOM ==========
function showLoginModal() {
  document.getElementById('loginModal').classList.add('active');
  document.getElementById('loginPassword').value = '';
  document.getElementById('loginError').innerHTML = '';
}

function hideLoginModal() {
  document.getElementById('loginModal').classList.remove('active');
}

function doLogin() {
  const pwd = document.getElementById('loginPassword').value;
  if (pwd === "admin123") {
    setAdmin(true);
    hideLoginModal();
    openAdminPanel();
  } else {
    document.getElementById('loginError').innerHTML = '❌ Password salah!';
  }
}

// ========== ADMIN PANEL ==========
function openAdminPanel() {
  if (!isAdmin) {
    showLoginModal();
    return;
  }
  renderAdminPanel();
  document.getElementById('adminModal').classList.add('active');
}

function renderAdminPanel() {
  const body = document.getElementById('adminBody');
  const freeCount = scripts.filter(s => s.tag === 'free').length;
  const keylessCount = scripts.filter(s => s.tag === 'keyless').length;
  const paidCount = scripts.filter(s => s.tag === 'paid').length;
  
  body.innerHTML = `
    <div style="margin-bottom:20px;">
      <button id="logoutAdmin" class="btn-submit btn-danger" style="width:auto; padding:8px 20px;">🚪 LOGOUT</button>
    </div>
    <div class="admin-stats">
      <div class="admin-stat-card"><h3>${scripts.length}</h3><p>Total Script</p></div>
      <div class="admin-stat-card"><h3>${freeCount}</h3><p>FREE</p></div>
      <div class="admin-stat-card"><h3>${keylessCount}</h3><p>KEYLESS</p></div>
      <div class="admin-stat-card"><h3>${paidCount}</h3><p>PAID</p></div>
    </div>
    
    <h3 style="color:var(--neon-cyan); margin-bottom:15px;">➕ TAMBAH / EDIT SCRIPT</h3>
    <form id="adminForm">
      <input type="hidden" id="editId">
      <div class="form-group"><label>JUDUL SCRIPT *</label><input type="text" id="formTitle" required placeholder="Wonder Chase V3"></div>
      <div class="form-group"><label>NAMA GAME *</label><input type="text" id="formGame" required placeholder="WONDER CHASE OBBY"></div>
      <div class="form-group"><label>DESKRIPSI</label><textarea id="formDesc" rows="2" placeholder="Deskripsi script..."></textarea></div>
      <div class="form-row">
        <div class="form-group"><label>TAG</label><select id="formTag"><option value="free">FREE</option><option value="keyless">KEYLESS</option><option value="paid">PAID</option></select></div>
        <div class="form-group"><label>FITUR (pisah koma)</label><input type="text" id="formFeatures" placeholder="Auto Farm, ESP"></div>
      </div>
      <div class="form-group"><label>🎨 IMAGE URL (opsional)</label><input type="text" id="formImage" placeholder="https://..."><img id="imagePreview" class="image-preview"></div>
      <div class="form-group"><label>💻 LUA SCRIPT CODE *</label><textarea id="formCode" rows="8" placeholder="-- script lua disini..."></textarea></div>
      <button type="submit" class="btn-submit">💾 SAVE SCRIPT</button>
      <button type="button" id="cancelForm" class="btn-submit btn-danger" style="margin-top:10px;">BATAL</button>
    </form>
    
    <hr style="margin:25px 0; border-color:var(--border);">
    
    <h3 style="color:var(--neon-cyan); margin-bottom:15px;">📋 DAFTAR SCRIPT (${scripts.length})</h3>
    <div id="adminScriptsList">
      ${scripts.map(s => `
        <div class="script-list-item" data-id="${s.id}">
          <div><strong style="color:var(--neon-cyan);">${escapeHtml(s.title)}</strong><br><span style="font-size:0.7rem; color:var(--muted);">${escapeHtml(s.game)} | ${s.tag}</span></div>
          <div><button class="icon-btn edit-script" data-id="${s.id}">✏️ EDIT</button><button class="icon-btn delete-script" data-id="${s.id}">🗑️ DELETE</button></div>
        </div>
      `).join('')}
    </div>
  `;
  
  // Form submit
  document.getElementById('adminForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const editId = document.getElementById('editId').value;
    const newScript = {
      id: editId ? parseInt(editId) : Date.now(),
      title: document.getElementById('formTitle').value.trim(),
      game: document.getElementById('formGame').value.trim(),
      desc: document.getElementById('formDesc').value.trim(),
      tag: document.getElementById('formTag').value,
      features: document.getElementById('formFeatures').value.split(',').map(f => f.trim()).filter(f => f),
      image: document.getElementById('formImage').value.trim(),
      code: document.getElementById('formCode').value
    };
    if (!newScript.title || !newScript.game || !newScript.code) {
      alert("Judul, Game, dan Code wajib diisi!");
      return;
    }
    if (editId) {
      const idx = scripts.findIndex(s => s.id == editId);
      if (idx !== -1) scripts[idx] = newScript;
    } else {
      scripts.push(newScript);
    }
    saveData();
    renderGrid();
    renderAdminPanel();
  });
  
  // Cancel form
  document.getElementById('cancelForm').addEventListener('click', () => {
    document.getElementById('editId').value = '';
    document.getElementById('formTitle').value = '';
    document.getElementById('formGame').value = '';
    document.getElementById('formDesc').value = '';
    document.getElementById('formTag').value = 'free';
    document.getElementById('formFeatures').value = '';
    document.getElementById('formImage').value = '';
    document.getElementById('formCode').value = '';
    document.getElementById('imagePreview').style.display = 'none';
  });
  
  // Logout
  document.getElementById('logoutAdmin').addEventListener('click', () => {
    setAdmin(false);
    document.getElementById('adminModal').classList.remove('active');
  });
  
  // Image preview
  document.getElementById('formImage').addEventListener('input', (e) => {
    const preview = document.getElementById('imagePreview');
    if (e.target.value) {
      preview.src = e.target.value;
      preview.style.display = 'block';
    } else {
      preview.style.display = 'none';
    }
  });
  
  // Edit scripts
  document.querySelectorAll('.edit-script').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = parseInt(btn.dataset.id);
      const s = scripts.find(sc => sc.id === id);
      if (s) {
        document.getElementById('editId').value = s.id;
        document.getElementById('formTitle').value = s.title;
        document.getElementById('formGame').value = s.game;
        document.getElementById('formDesc').value = s.desc;
        document.getElementById('formTag').value = s.tag;
        document.getElementById('formFeatures').value = s.features.join(', ');
        document.getElementById('formImage').value = s.image || '';
        document.getElementById('formCode').value = s.code;
        if (s.image) {
          document.getElementById('imagePreview').src = s.image;
          document.getElementById('imagePreview').style.display = 'block';
        }
      }
    });
  });
  
  // Delete scripts
  document.querySelectorAll('.delete-script').forEach(btn => {
    btn.addEventListener('click', () => {
      if (confirm("Yakin hapus script ini?")) {
        const id = parseInt(btn.dataset.id);
        scripts = scripts.filter(s => s.id !== id);
        saveData();
        renderGrid();
        renderAdminPanel();
      }
    });
  });
}

// EVENT LISTENERS
document.getElementById('adminBtn').addEventListener('click', openAdminPanel);
document.getElementById('closeAdminModal').addEventListener('click', () => {
  document.getElementById('adminModal').classList.remove('active');
});
document.getElementById('adminModal').addEventListener('click', (e) => {
  if (e.target === document.getElementById('adminModal')) {
    document.getElementById('adminModal').classList.remove('active');
  }
});

// Login modal events
document.getElementById('loginSubmit').addEventListener('click', doLogin);
document.getElementById('loginCancel').addEventListener('click', hideLoginModal);
document.getElementById('loginPassword').addEventListener('keypress', (e) => {
  if (e.key === 'Enter') doLogin();
});
document.getElementById('loginModal').addEventListener('click', (e) => {
  if (e.target === document.getElementById('loginModal')) hideLoginModal();
});

document.getElementById('searchInput').addEventListener('input', (e) => {
  searchQuery = e.target.value;
  renderGrid();
});

document.getElementById('filterTabs').addEventListener('click', (e) => {
  if (!e.target.classList.contains('tab')) return;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  e.target.classList.add('active');
  activeFilter = e.target.dataset.filter;
  renderGrid();
});

// INIT
loadData();
checkAdminSession();
renderGrid();
</script>
