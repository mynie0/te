<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>RobloxScriptHub Pro | Admin Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  :root {
    --bg: #050510;
    --bg2: #080820;
    --card: #0d0d2b;
    --neon-pink: #ff2d78;
    --neon-cyan: #00f5ff;
    --neon-green: #39ff14;
    --neon-purple: #bf00ff;
    --neon-yellow: #ffe600;
    --text: #e0e0ff;
    --muted: #6060aa;
    --border: rgba(0,245,255,0.15);
    --admin-sidebar: #0a0a1a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: linear-gradient(rgba(0,245,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,245,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px);
    pointer-events: none;
    z-index: 0;
  }
  .container { max-width: 1400px; margin: 0 auto; padding: 0 20px; position: relative; z-index: 2; }

  /* HEADER */
  header { padding: 20px 0; border-bottom: 1px solid var(--border); background: rgba(5,5,16,0.8); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 50; }
  .header-inner { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px; }
  .logo { font-family: 'Orbitron', monospace; font-size: 1.5rem; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; }
  .logo span:nth-child(1) { color: var(--neon-cyan); text-shadow: 0 0 18px var(--neon-cyan); }
  .logo span:nth-child(2) { color: var(--neon-pink); text-shadow: 0 0 18px var(--neon-pink); }
  .logo span:nth-child(3) { color: var(--neon-green); text-shadow: 0 0 18px var(--neon-green); }
  .admin-btn { background: linear-gradient(135deg, var(--neon-pink), var(--neon-purple)); border: none; color: white; font-family: 'Orbitron', monospace; font-size: 0.8rem; padding: 10px 24px; border-radius: 30px; cursor: pointer; transition: 0.3s; font-weight: bold; }
  .admin-btn:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(255,45,120,0.5); }
  .user-btn { background: rgba(0,245,255,0.2); border: 1px solid var(--neon-cyan); color: var(--neon-cyan); }
  
  /* ADMIN LAYOUT */
  .admin-layout { display: flex; gap: 30px; margin-top: 30px; }
  .admin-sidebar { width: 320px; flex-shrink: 0; background: var(--admin-sidebar); border-radius: 16px; border: 1px solid var(--border); padding: 20px; position: sticky; top: 90px; height: fit-content; }
  .admin-content { flex: 1; }
  .admin-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 25px; }
  .stat-card { background: var(--card); border-radius: 12px; padding: 20px; text-align: center; border: 1px solid var(--border); }
  .stat-card h3 { font-size: 2rem; color: var(--neon-cyan); font-family: 'Orbitron'; }
  .stat-card p { color: var(--muted); margin-top: 5px; }
  .admin-form { background: var(--card); border-radius: 16px; padding: 20px; border: 1px solid var(--border); margin-bottom: 25px; }
  .admin-form h3 { margin-bottom: 20px; color: var(--neon-cyan); font-family: 'Orbitron'; font-size: 1rem; }
  .form-group { margin-bottom: 15px; }
  .form-group label { display: block; margin-bottom: 5px; color: var(--neon-pink); font-family: 'Share Tech Mono'; font-size: 0.75rem; }
  .form-group input, .form-group textarea, .form-group select { width: 100%; background: #0a0a1a; border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; color: white; font-family: 'Rajdhani'; font-size: 0.9rem; outline: none; }
  .form-group input:focus, .form-group textarea:focus { border-color: var(--neon-cyan); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
  .btn-submit { background: linear-gradient(135deg, var(--neon-green), #00aa00); border: none; color: white; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
  .btn-danger { background: linear-gradient(135deg, var(--neon-pink), #aa0033); }
  .image-preview { max-width: 100%; max-height: 120px; border-radius: 8px; margin-top: 10px; display: none; }
  
  /* SCRIPT LIST ADMIN */
  .scripts-admin-list { background: var(--card); border-radius: 16px; padding: 20px; border: 1px solid var(--border); }
  .script-item { background: #0a0a1a; border-radius: 12px; padding: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; border-left: 3px solid var(--neon-pink); }
  .script-info h4 { color: var(--neon-cyan); margin-bottom: 5px; }
  .script-info p { font-size: 0.8rem; color: var(--muted); }
  .script-actions { display: flex; gap: 10px; }
  .icon-btn { background: transparent; border: 1px solid var(--border); color: white; padding: 8px 12px; border-radius: 6px; cursor: pointer; transition: 0.2s; }
  .icon-btn:hover { border-color: var(--neon-cyan); color: var(--neon-cyan); }
  .icon-btn.danger:hover { border-color: var(--neon-pink); color: var(--neon-pink); }

  /* USER VIEW GRID */
  .user-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 20px; margin-top: 30px; }
  .user-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 22px; transition: 0.2s; }
  .user-card:hover { transform: translateY(-3px); box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
  .user-card-image { width: 100%; height: 140px; object-fit: cover; border-radius: 8px; margin-bottom: 14px; background: #0a0a1a; }
  .user-card-title { font-family: 'Orbitron'; font-size: 1rem; color: white; margin-bottom: 8px; }
  .user-card-game { color: var(--neon-purple); font-size: 0.7rem; margin-bottom: 10px; }
  .user-card-desc { color: #9090cc; font-size: 0.85rem; margin-bottom: 12px; }
  .user-card-features { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 15px; }
  .user-feat { background: rgba(255,255,255,0.04); padding: 3px 8px; border-radius: 4px; font-size: 0.65rem; }
  .user-tag { padding: 3px 10px; border-radius: 20px; font-size: 0.65rem; display: inline-block; margin-bottom: 10px; }
  .tag-free { background: rgba(57,255,20,0.12); color: var(--neon-green); }
  .tag-keyless { background: rgba(0,245,255,0.12); color: var(--neon-cyan); }
  .tag-paid { background: rgba(255,230,0,0.12); color: var(--neon-yellow); }
  .user-buttons { display: flex; gap: 10px; margin-top: 10px; }
  .user-btn-copy { border: 1px solid var(--neon-cyan); color: var(--neon-cyan); background: transparent; padding: 8px; border-radius: 6px; cursor: pointer; flex: 1; }
  .user-btn-raw { border: 1px solid var(--neon-pink); color: var(--neon-pink); background: transparent; padding: 8px; border-radius: 6px; cursor: pointer; flex: 1; }

  .search-bar { margin: 20px 0; }
  .search-bar input { width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 12px 20px; color: white; }
  .filter-tabs { display: flex; gap: 10px; flex-wrap: wrap; margin: 20px 0; }
  .filter-tab { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 6px 16px; border-radius: 20px; cursor: pointer; }
  .filter-tab.active { background: rgba(0,245,255,0.1); border-color: var(--neon-cyan); color: var(--neon-cyan); }
  .empty-state { text-align: center; padding: 60px; color: var(--muted); }
  
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(5px); z-index: 200; display: none; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--bg2); border: 1px solid var(--neon-cyan); border-radius: 12px; max-width: 700px; width: 90%; max-height: 80vh; overflow: auto; }
  .modal-header { padding: 15px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
  .modal-body { padding: 20px; }
  .modal-body pre { white-space: pre-wrap; font-family: monospace; font-size: 0.8rem; }
  .modal-footer { padding: 15px 20px; border-top: 1px solid var(--border); display: flex; gap: 10px; justify-content: flex-end; }
  .modal-close { background: none; border: none; color: white; font-size: 24px; cursor: pointer; }

  @media (max-width: 900px) { .admin-layout { flex-direction: column; } .admin-sidebar { width: 100%; position: static; } }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="header-inner">
      <div><div class="logo"><span>Roblox</span><span>Script</span><span>Hub</span></div><div class="logo-sub">PROFESSIONAL ADMIN DASHBOARD</div></div>
      <button class="admin-btn" id="adminToggleBtn">🔐 ADMIN LOGIN</button>
    </div>
  </header>

  <div id="appContent">
    <!-- User View akan di-render di sini -->
  </div>
</div>

<!-- LOGIN MODAL -->
<div class="modal-overlay" id="loginModal">
  <div class="modal" style="max-width: 400px;">
    <div class="modal-header"><h3 style="color:var(--neon-cyan);">🔐 ADMIN LOGIN</h3><button class="modal-close" id="closeLoginBtn">&times;</button></div>
    <div class="modal-body">
      <div class="form-group"><label>PASSWORD ADMIN</label><input type="password" id="loginPassword" placeholder="Masukkan password" autocomplete="off"></div>
      <div id="loginError" style="color:var(--neon-pink); margin-top: 10px;"></div>
    </div>
    <div class="modal-footer"><button class="btn-submit" id="submitLoginBtn" style="width:auto;">LOGIN</button><button class="icon-btn" id="cancelLoginBtn">BATAL</button></div>
  </div>
</div>

<!-- RAW MODAL -->
<div class="modal-overlay" id="rawModal">
  <div class="modal"><div class="modal-header"><h3 id="rawTitle">RAW SCRIPT</h3><button class="modal-close" id="closeRawBtn">&times;</button></div><div class="modal-body"><pre id="rawContent"></pre></div><div class="modal-footer"><button class="icon-btn" id="copyRawBtn">COPY</button><button class="icon-btn" id="closeRawFooterBtn">TUTUP</button></div></div>
</div>

<script>
  // DEFAULT SCRIPTS (6 script dari user)
  const defaultScripts = [
    { id: 1, title: "Wonder Chase V3", game: "WONDER CHASE OBBY", desc: "Auto play obby dengan portal teleportation, sticker & pickup collection, anti-replay otomatis.", tag: "free", features: ["Auto Portal","Pickup Collect","Anti-AFK","Auto Replay"], image: "", code: `-- Wonder Chase V3 | RobloxScriptHub\nlocal Players = game:GetService("Players")\nlocal VirtualUser = game:GetService("VirtualUser")\nlocal lp = Players.LocalPlayer\nlp.Idled:Connect(function() VirtualUser:Button2Down(Vector2.new(0,0), workspace.CurrentCamera.CFrame) task.wait(1) VirtualUser:Button2Up(Vector2.new(0,0), workspace.CurrentCamera.CFrame) end)\nprint("[WonderChase] Loaded")` },
    { id: 2, title: "Orb Collector ESP", game: "ANY GAME (ORB)", desc: "Auto collect semua orb di workspace dengan ESP BillboardGui RGB, FPS booster, dan distance display.", tag: "keyless", features: ["Auto Collect","ESP RGB","FPS Boost"], image: "", code: `-- Orb Collector ESP\nlocal RunService = game:GetService("RunService")\ngetgenv().OrbESP = true\nRunService.Heartbeat:Connect(function()\n    for _, obj in pairs(workspace:GetDescendants()) do\n        if obj:IsA("BasePart") and obj.Name:lower():find("orb") then\n            firetouchinterest(game.Players.LocalPlayer.Character.HumanoidRootPart, obj, 0)\n        end\n    end\nend)` },
    { id: 3, title: "Checkpoint Farmer", game: "BADGE / OBBY GAME", desc: "Auto teleport ke semua checkpoint dan farming badge dengan loop otomatis. Support folder ClearStage.", tag: "free", features: ["Auto TP","Badge Farm","ClearStage Loop"], image: "", code: `-- Checkpoint Farmer\nlocal Players = game:GetService("Players")\nlocal lp = Players.LocalPlayer\nlocal hrp = lp.Character.HumanoidRootPart\ngetgenv().CheckpointFarm = true\nwhile getgenv().CheckpointFarm do\n    for i=1,999 do\n        local cp = workspace:FindFirstChild("ClearStage"..i)\n        if cp and cp:FindFirstChildWhichIsA("BasePart") then hrp.CFrame = cp:FindFirstChildWhichIsA("BasePart").CFrame end\n    end\n    task.wait(1)\nend` },
    { id: 4, title: "Inf Point Clicker", game: "ECLIPSE JOIN & CLAIM", desc: "Toggle Infinite Point yang fire AddPoint:FireServer() dan set WalkSpeed via RunService Heartbeat.", tag: "keyless", features: ["Inf Points","WalkSpeed","Toggle"], image: "", code: `-- Inf Point\nlocal RunService = game:GetService("RunService")\ngetgenv().InfPoint = true\nRunService.Heartbeat:Connect(function()\n    if getgenv().InfPoint then\n        game.Players.LocalPlayer.Character.Humanoid.WalkSpeed = 50\n        pcall(function() game:GetService("ReplicatedStorage"):WaitChild("AddPoint"):FireServer() end)\n    end\nend)` },
    { id: 5, title: "UGC Auto Claim", game: "EVENT / UGC GAME", desc: "Auto collect UGC item dan fire DJ remote. Support adidas event dan game event sejenis.", tag: "free", features: ["Auto Collect UGC","Fire Remote","RequestDJ"], image: "", code: `-- UGC Auto Claim\nlocal RS = game:GetService("ReplicatedStorage")\ngetgenv().UGCClaim = true\nwhile getgenv().UGCClaim do\n    pcall(function() RS.Remotes.RequestDJ:FireServer() end)\n    task.wait(0.5)\nend` },
    { id: 6, title: "Anti Lag Ultimate", game: "ALL GAMES", desc: "Optimasi performa Roblox: kurangi render quality, matiin shadow, fog, particle, dan hide player lain.", tag: "free", features: ["Low Quality","No Shadow","No Fog","Hide Players"], image: "", code: `-- Anti Lag Ultimate\nsettings().Rendering.QualityLevel = 1\ngame:GetService("Lighting").GlobalShadows = false\nprint("AntiLag Applied")` }
  ];

  let scripts = [];
  let isAdmin = false;
  let activeFilter = "all";
  let searchQuery = "";

  // Load data dari localStorage
  function loadData() {
    const stored = localStorage.getItem("RobloxScriptHub_Pro");
    if (stored) {
      try {
        scripts = JSON.parse(stored);
        if (!Array.isArray(scripts)) throw new Error();
      } catch(e) { scripts = JSON.parse(JSON.stringify(defaultScripts)); }
    } else {
      scripts = JSON.parse(JSON.stringify(defaultScripts));
    }
    // Reassign id
    scripts.forEach((s, idx) => { if (!s.id) s.id = Date.now() + idx; });
    saveData();
  }
  function saveData() { localStorage.setItem("RobloxScriptHub_Pro", JSON.stringify(scripts)); }

  // Cek session admin
  function checkAdminSession() {
    const saved = localStorage.getItem("RobloxScriptHub_Admin");
    if (saved === "true") {
      isAdmin = true;
      document.getElementById("adminToggleBtn").innerHTML = "👑 ADMIN DASHBOARD";
      document.getElementById("adminToggleBtn").style.background = "linear-gradient(135deg, #39ff14, #00aa00)";
    } else {
      isAdmin = false;
      document.getElementById("adminToggleBtn").innerHTML = "🔐 ADMIN LOGIN";
      document.getElementById("adminToggleBtn").style.background = "linear-gradient(135deg, #ff2d78, #bf00ff)";
    }
    render();
  }

  function login(password) {
    if (password === "admin123") {
      isAdmin = true;
      localStorage.setItem("RobloxScriptHub_Admin", "true");
      document.getElementById("loginModal").classList.remove("open");
      document.getElementById("adminToggleBtn").innerHTML = "👑 ADMIN DASHBOARD";
      document.getElementById("adminToggleBtn").style.background = "linear-gradient(135deg, #39ff14, #00aa00)";
      render();
    } else {
      document.getElementById("loginError").innerHTML = "❌ Password salah!";
    }
  }

  function logout() {
    isAdmin = false;
    localStorage.setItem("RobloxScriptHub_Admin", "false");
    document.getElementById("adminToggleBtn").innerHTML = "🔐 ADMIN LOGIN";
    document.getElementById("adminToggleBtn").style.background = "linear-gradient(135deg, #ff2d78, #bf00ff)";
    render();
  }

  // RENDER UTAMA
  function render() {
    const app = document.getElementById("appContent");
    if (isAdmin) {
      app.innerHTML = renderAdminView();
      attachAdminEvents();
    } else {
      app.innerHTML = renderUserView();
      attachUserEvents();
    }
  }

  function renderUserView() {
    let filtered = scripts.filter(s => {
      if (activeFilter !== "all" && s.tag !== activeFilter) return false;
      if (searchQuery && !s.title.toLowerCase().includes(searchQuery) && !s.game.toLowerCase().includes(searchQuery)) return false;
      return true;
    });
    return `
      <div class="search-bar"><input type="text" id="userSearch" placeholder="🔍 Cari script atau game..." value="${searchQuery}"></div>
      <div class="filter-tabs" id="userFilters">
        <button class="filter-tab ${activeFilter === 'all' ? 'active' : ''}" data-filter="all">ALL</button>
        <button class="filter-tab ${activeFilter === 'free' ? 'active' : ''}" data-filter="free">FREE</button>
        <button class="filter-tab ${activeFilter === 'keyless' ? 'active' : ''}" data-filter="keyless">KEYLESS</button>
        <button class="filter-tab ${activeFilter === 'paid' ? 'active' : ''}" data-filter="paid">PAID</button>
      </div>
      <div class="stats" style="margin-bottom:20px"><span>📦 Total Script: <b>${scripts.length}</b></span><span>📋 Ditampilkan: <b>${filtered.length}</b></span></div>
      <div class="user-grid" id="userGrid">
        ${filtered.map((s, idx) => `
          <div class="user-card">
            ${s.image ? `<img class="user-card-image" src="${escapeHtml(s.image)}" onerror="this.style.display='none'">` : ''}
            <div class="user-tag ${s.tag === 'free' ? 'tag-free' : (s.tag === 'keyless' ? 'tag-keyless' : 'tag-paid')}">${s.tag.toUpperCase()}</div>
            <div class="user-card-title">${escapeHtml(s.title)}</div>
            <div class="user-card-game">📁 ${escapeHtml(s.game)}</div>
            <div class="user-card-desc">${escapeHtml(s.desc)}</div>
            <div class="user-card-features">${s.features.map(f => `<span class="user-feat">${escapeHtml(f)}</span>`).join('')}</div>
            <div class="user-buttons"><button class="user-btn-copy" data-idx="${idx}">⎘ COPY</button><button class="user-btn-raw" data-idx="${idx}">◈ RAW</button></div>
          </div>
        `).join('')}
        ${filtered.length === 0 ? '<div class="empty-state">🔍 Tidak ada script yang ditemukan</div>' : ''}
      </div>
    `;
  }

  function renderAdminView() {
    const freeCount = scripts.filter(s => s.tag === 'free').length;
    const keylessCount = scripts.filter(s => s.tag === 'keyless').length;
    const paidCount = scripts.filter(s => s.tag === 'paid').length;
    return `
      <div class="admin-layout">
        <div class="admin-sidebar">
          <div class="admin-stats">
            <div class="stat-card"><h3>${scripts.length}</h3><p>Total Script</p></div>
            <div class="stat-card"><h3>${freeCount}</h3><p>FREE</p></div>
            <div class="stat-card"><h3>${keylessCount}</h3><p>KEYLESS</p></div>
          </div>
          <div class="admin-form">
            <h3><i class="fas fa-plus-circle"></i> Tambah / Edit Script</h3>
            <form id="adminScriptForm">
              <input type="hidden" id="editId" value="">
              <div class="form-group"><label>JUDUL SCRIPT *</label><input type="text" id="formTitle" required placeholder="Wonder Chase V3"></div>
              <div class="form-group"><label>NAMA GAME *</label><input type="text" id="formGame" required placeholder="WONDER CHASE OBBY"></div>
              <div class="form-group"><label>DESKRIPSI</label><textarea id="formDesc" rows="2" placeholder="Deskripsi script..."></textarea></div>
              <div class="form-row"><div class="form-group"><label>TAG</label><select id="formTag"><option value="free">FREE</option><option value="keyless">KEYLESS</option><option value="paid">PAID</option></select></div>
              <div class="form-group"><label>FITUR (pisah dengan koma)</label><input type="text" id="formFeatures" placeholder="Auto Farm, ESP, Anti-AFK"></div></div>
              <div class="form-group"><label>🎨 IMAGE URL (opsional - GitHub raw / gambar apapun)</label><input type="text" id="formImage" placeholder="https://..."><img id="imagePreview" class="image-preview"></div>
              <div class="form-group"><label>💻 LUA SCRIPT CODE *</label><textarea id="formCode" rows="8" placeholder="-- script lua disini..."></textarea></div>
              <button type="submit" class="btn-submit"><i class="fas fa-save"></i> SAVE SCRIPT</button>
              <button type="button" id="cancelEditBtn" class="icon-btn" style="width:100%; margin-top:10px;">BATAL</button>
            </form>
          </div>
          <button id="adminLogoutBtn" class="btn-submit btn-danger" style="background:linear-gradient(135deg,#ff2d78,#aa0033);"><i class="fas fa-sign-out-alt"></i> LOGOUT</button>
        </div>
        <div class="admin-content">
          <div class="scripts-admin-list">
            <h3><i class="fas fa-list"></i> Daftar Script (${scripts.length})</h3>
            <div id="adminScriptsList">
              ${scripts.map((s, idx) => `
                <div class="script-item" data-id="${s.id}">
                  <div class="script-info"><h4>${escapeHtml(s.title)}</h4><p>${escapeHtml(s.game)} | <span style="color:var(--neon-cyan)">${s.tag}</span></p></div>
                  <div class="script-actions"><button class="icon-btn edit-script" data-id="${s.id}"><i class="fas fa-edit"></i> Edit</button><button class="icon-btn danger delete-script" data-id="${s.id}"><i class="fas fa-trash"></i> Hapus</button></div>
                </div>
              `).join('')}
            </div>
          </div>
        </div>
      </div>
    `;
  }

  function attachAdminEvents() {
    // Form submit
    document.getElementById("adminScriptForm")?.addEventListener("submit", (e) => {
      e.preventDefault();
      const editId = document.getElementById("editId").value;
      const newScript = {
        id: editId ? parseInt(editId) : Date.now(),
        title: document.getElementById("formTitle").value.trim(),
        game: document.getElementById("formGame").value.trim(),
        desc: document.getElementById("formDesc").value.trim(),
        tag: document.getElementById("formTag").value,
        features: document.getElementById("formFeatures").value.split(",").map(f => f.trim()).filter(f => f),
        image: document.getElementById("formImage").value.trim(),
        code: document.getElementById("formCode").value
      };
      if (!newScript.title || !newScript.game || !newScript.code) { alert("Judul, Game, dan Code wajib diisi!"); return; }
      if (editId) {
        const idx = scripts.findIndex(s => s.id == editId);
        if (idx !== -1) scripts[idx] = newScript;
      } else { scripts.push(newScript); }
      saveData();
      render();
    });

    document.getElementById("cancelEditBtn")?.addEventListener("click", () => {
      document.getElementById("editId").value = "";
      document.getElementById("formTitle").value = "";
      document.getElementById("formGame").value = "";
      document.getElementById("formDesc").value = "";
      document.getElementById("formTag").value = "free";
      document.getElementById("formFeatures").value = "";
      document.getElementById("formImage").value = "";
      document.getElementById("formCode").value = "";
      document.getElementById("imagePreview").style.display = "none";
    });

    document.getElementById("adminLogoutBtn")?.addEventListener("click", () => { logout(); });
    
    // Image preview
    document.getElementById("formImage")?.addEventListener("input", (e) => {
      const preview = document.getElementById("imagePreview");
      if (e.target.value) { preview.src = e.target.value; preview.style.display = "block"; }
      else { preview.style.display = "none"; }
    });

    // Edit & Delete buttons
    document.querySelectorAll(".edit-script").forEach(btn => {
      btn.addEventListener("click", () => {
        const id = parseInt(btn.dataset.id);
        const s = scripts.find(sc => sc.id === id);
        if (s) {
          document.getElementById("editId").value = s.id;
          document.getElementById("formTitle").value = s.title;
          document.getElementById("formGame").value = s.game;
          document.getElementById("formDesc").value = s.desc;
          document.getElementById("formTag").value = s.tag;
          document.getElementById("formFeatures").value = s.features.join(", ");
          document.getElementById("formImage").value = s.image || "";
          document.getElementById("formCode").value = s.code;
          if (s.image) { document.getElementById("imagePreview").src = s.image; document.getElementById("imagePreview").style.display = "block"; }
        }
      });
    });
    document.querySelectorAll(".delete-script").forEach(btn => {
      btn.addEventListener("click", () => {
        if (confirm("Yakin hapus script ini?")) {
          const id = parseInt(btn.dataset.id);
          scripts = scripts.filter(s => s.id !== id);
          saveData();
          render();
        }
      });
    });
  }

  function attachUserEvents() {
    document.getElementById("userSearch")?.addEventListener("input", (e) => { searchQuery = e.target.value.toLowerCase(); render(); });
    document.querySelectorAll("#userFilters .filter-tab").forEach(tab => {
      tab.addEventListener("click", () => { activeFilter = tab.dataset.filter; render(); });
    });
    document.querySelectorAll(".user-btn-copy").forEach(btn => {
      btn.addEventListener("click", (e) => {
        const idx = parseInt(btn.dataset.idx);
        const filtered = scripts.filter(s => {
          if (activeFilter !== "all" && s.tag !== activeFilter) return false;
          if (searchQuery && !s.title.toLowerCase().includes(searchQuery) && !s.game.toLowerCase().includes(searchQuery)) return false;
          return true;
        });
        navigator.clipboard.writeText(filtered[idx].code);
        btn.innerText = "✓ COPIED";
        setTimeout(() => btn.innerText = "⎘ COPY", 1500);
      });
    });
    document.querySelectorAll(".user-btn-raw").forEach(btn => {
      btn.addEventListener("click", (e) => {
        const idx = parseInt(btn.dataset.idx);
        const filtered = scripts.filter(s => {
          if (activeFilter !== "all" && s.tag !== activeFilter) return false;
          if (searchQuery && !s.title.toLowerCase().includes(searchQuery) && !s.game.toLowerCase().includes(searchQuery)) return false;
          return true;
        });
        document.getElementById("rawTitle").innerHTML = `RAW - ${filtered[idx].title}`;
        document.getElementById("rawContent").innerText = filtered[idx].code;
        document.getElementById("rawModal").classList.add("open");
      });
    });
  }

  function escapeHtml(str) { if (!str) return ""; return str.replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }

  // Modal handlers
  document.getElementById("adminToggleBtn").onclick = () => {
    if (isAdmin) { render(); }
    else { document.getElementById("loginModal").classList.add("open"); document.getElementById("loginPassword").value = ""; document.getElementById("loginError").innerHTML = ""; }
  };
  document.getElementById("submitLoginBtn").onclick = () => login(document.getElementById("loginPassword").value);
  document.getElementById("closeLoginBtn").onclick = () => document.getElementById("loginModal").classList.remove("open");
  document.getElementById("cancelLoginBtn").onclick = () => document.getElementById("loginModal").classList.remove("open");
  document.getElementById("closeRawBtn").onclick = () => document.getElementById("rawModal").classList.remove("open");
  document.getElementById("closeRawFooterBtn").onclick = () => document.getElementById("rawModal").classList.remove("open");
  document.getElementById("copyRawBtn").onclick = () => { navigator.clipboard.writeText(document.getElementById("rawContent").innerText); alert("Copied!"); };
  document.getElementById("loginPassword").addEventListener("keypress", (e) => { if (e.key === "Enter") login(document.getElementById("loginPassword").value); });

  loadData();
  checkAdminSession();
</script>
</body>
</html>
