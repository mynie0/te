<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ByokuXMon Hub | Secure Script Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #fff;
            overflow-x: hidden;
        }

        /* Animated Gradient Background */
        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(255, 94, 94, 0.08) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(255, 94, 94, 0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        /* Navbar */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(10, 10, 15, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 94, 94, 0.3);
            z-index: 1000;
            padding: 16px 5%;
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, #ff5e5e, #ff2e2e);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 5px #ff5e5e; }
            50% { box-shadow: 0 0 20px #ff5e5e; }
        }

        .logo h1 {
            font-size: 22px;
            font-weight: 800;
            background: linear-gradient(135deg, #ff5e5e, #ff8888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo span {
            font-size: 10px;
            color: #ff5e5e;
            background: rgba(255, 94, 94, 0.2);
            padding: 2px 8px;
            border-radius: 20px;
            margin-left: 8px;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .admin-btn {
            background: rgba(255, 94, 94, 0.15);
            border: 1px solid rgba(255, 94, 94, 0.5);
            padding: 10px 20px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
            font-size: 14px;
        }

        .admin-btn:hover, .admin-btn.active {
            background: #ff5e5e;
            border-color: #ff5e5e;
        }

        /* Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 100px 5% 60px;
            position: relative;
            z-index: 1;
        }

        /* Hero */
        .hero {
            text-align: center;
            margin-bottom: 60px;
        }

        .hero h2 {
            font-size: 48px;
            font-weight: 800;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #fff, #ff5e5e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            font-size: 16px;
            color: #888;
            max-width: 500px;
            margin: 0 auto;
        }

        /* Stats */
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 50px;
        }

        .stat {
            background: rgba(20, 15, 30, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 94, 94, 0.2);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            transition: 0.3s;
        }

        .stat:hover {
            border-color: #ff5e5e;
            transform: translateY(-3px);
        }

        .stat i {
            font-size: 28px;
            color: #ff5e5e;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 800;
        }

        .stat-label {
            font-size: 12px;
            color: #888;
            margin-top: 4px;
        }

        /* Search */
        .search-wrapper {
            margin-bottom: 30px;
        }

        .search-box {
            background: rgba(20, 15, 30, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .search-box:focus-within {
            border-color: #ff5e5e;
        }

        .search-box i {
            color: #ff5e5e;
            font-size: 18px;
        }

        .search-box input {
            flex: 1;
            background: none;
            border: none;
            color: white;
            font-size: 14px;
            outline: none;
        }

        .filters {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .filter {
            background: rgba(20, 15, 30, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 6px 18px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 13px;
            transition: 0.3s;
        }

        .filter:hover, .filter.active {
            background: #ff5e5e;
            border-color: #ff5e5e;
        }

        /* Script Grid */
        .scripts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 24px;
        }

        .script-card {
            background: rgba(20, 15, 30, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 94, 94, 0.2);
            border-radius: 24px;
            overflow: hidden;
            transition: 0.3s;
        }

        .script-card:hover {
            transform: translateY(-5px);
            border-color: #ff5e5e;
            box-shadow: 0 10px 30px rgba(255, 94, 94, 0.15);
        }

        .card-header {
            padding: 20px 20px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-header h3 {
            font-size: 18px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-header h3 i {
            color: #ff5e5e;
            font-size: 20px;
        }

        .badge {
            background: rgba(255, 94, 94, 0.2);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            color: #ff5e5e;
        }

        .card-desc {
            padding: 0 20px;
            font-size: 13px;
            color: #999;
            line-height: 1.5;
            margin-bottom: 16px;
        }

        .loadstring-area {
            background: #0a0a0f;
            margin: 0 20px 16px;
            border-radius: 12px;
            padding: 14px;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .loadstring-area pre {
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 11px;
            color: #ff5e5e;
            white-space: pre-wrap;
            word-break: break-all;
            padding-right: 30px;
        }

        .copy-loadstring {
            position: absolute;
            top: 8px;
            right: 8px;
            background: #ff5e5e;
            border: none;
            padding: 4px 10px;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            font-size: 10px;
            font-weight: 600;
        }

        .card-actions {
            padding: 0 20px 20px;
            display: flex;
            gap: 12px;
        }

        .btn-execute {
            flex: 2;
            background: linear-gradient(135deg, #ff5e5e, #cc4444);
            border: none;
            padding: 12px;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.3s;
        }

        .btn-favorite {
            flex: 1;
            background: rgba(255, 94, 94, 0.15);
            border: 1px solid rgba(255, 94, 94, 0.3);
            padding: 12px;
            border-radius: 12px;
            color: #ff5e5e;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-weight: 500;
            transition: 0.3s;
        }

        .btn-favorite.active {
            background: #ff5e5e;
            color: white;
        }

        .card-footer {
            padding: 12px 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: #666;
        }

        /* Admin Panel */
        .admin-panel {
            position: fixed;
            top: 0;
            right: -500px;
            width: 500px;
            height: 100vh;
            background: #0f0c1a;
            border-left: 2px solid #ff5e5e;
            z-index: 2000;
            transition: 0.3s;
            overflow-y: auto;
            padding: 80px 30px 30px;
        }

        .admin-panel.open {
            right: 0;
        }

        .admin-panel h2 {
            color: #ff5e5e;
            margin-bottom: 24px;
            font-size: 24px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 13px;
            color: #ccc;
        }

        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            background: #1a1525;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 12px 16px;
            color: white;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
        }

        .form-group input:focus, .form-group textarea:focus {
            border-color: #ff5e5e;
        }

        .form-group textarea {
            font-family: monospace;
            font-size: 12px;
            min-height: 120px;
            resize: vertical;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ff5e5e, #cc4444);
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }

        .btn-secondary {
            background: rgba(255, 94, 94, 0.2);
            border: 1px solid #ff5e5e;
            padding: 12px 24px;
            border-radius: 12px;
            color: #ff5e5e;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }

        .admin-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }

        .scripts-table {
            width: 100%;
            margin-top: 20px;
        }

        .scripts-table table {
            width: 100%;
            border-collapse: collapse;
        }

        .scripts-table th, .scripts-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #333;
        }

        .scripts-table th {
            color: #ff5e5e;
        }

        .edit-script, .delete-script {
            padding: 4px 10px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            margin-right: 5px;
            font-size: 11px;
        }

        .edit-script {
            background: rgba(255, 94, 94, 0.2);
            color: #ff5e5e;
        }

        .delete-script {
            background: rgba(255, 50, 50, 0.2);
            color: #ff5555;
        }

        /* Overlay */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1500;
            display: none;
        }

        .overlay.show {
            display: block;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #1a1525;
            border: 1px solid #ff5e5e;
            border-radius: 12px;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            transform: translateX(400px);
            transition: 0.3s;
            z-index: 3000;
        }

        .toast.show {
            transform: translateX(0);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px;
            color: #666;
        }

        .empty-state i {
            font-size: 48px;
            margin-bottom: 16px;
        }

        @media (max-width: 768px) {
            .stats {
                grid-template-columns: repeat(2, 1fr);
            }
            .scripts-grid {
                grid-template-columns: 1fr;
            }
            .admin-panel {
                width: 100%;
                right: -100%;
            }
            .hero h2 {
                font-size: 32px;
            }
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>

    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <div class="logo-icon">
                    <i class="fas fa-shield-alt"></i>
                </div>
                <div>
                    <h1>ByokuXMon Hub <span>SECURE</span></h1>
                </div>
            </div>
            <div class="nav-right">
                <div class="admin-btn" id="adminBtn">
                    <i class="fas fa-user-shield"></i>
                    <span>Admin</span>
                </div>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="hero">
            <h2>Secure Script Collection</h2>
            <p>Loadstring aman | Script terenkripsi | Anti Crack</p>
        </div>

        <div class="stats">
            <div class="stat">
                <i class="fas fa-scroll"></i>
                <div class="stat-value" id="totalScripts">0</div>
                <div class="stat-label">Total Scripts</div>
            </div>
            <div class="stat">
                <i class="fas fa-star"></i>
                <div class="stat-value" id="totalFavorites">0</div>
                <div class="stat-label">Favorites</div>
            </div>
            <div class="stat">
                <i class="fas fa-tag"></i>
                <div class="stat-value" id="totalCategories">0</div>
                <div class="stat-label">Categories</div>
            </div>
            <div class="stat">
                <i class="fas fa-download"></i>
                <div class="stat-value" id="totalExecutes">0</div>
                <div class="stat-label">Total Executes</div>
            </div>
        </div>

        <div class="search-wrapper">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Cari script...">
            </div>
            <div class="filters" id="filtersContainer">
                <button class="filter active" data-cat="all">All</button>
            </div>
        </div>

        <div class="scripts-grid" id="scriptsGrid"></div>
    </div>

    <!-- Admin Panel -->
    <div class="overlay" id="overlay"></div>
    <div class="admin-panel" id="adminPanel">
        <button class="admin-close" id="closeAdmin"><i class="fas fa-times"></i></button>
        <h2><i class="fas fa-crown"></i> Admin Control</h2>
        
        <form id="scriptForm">
            <input type="hidden" id="editId">
            <div class="form-group">
                <label>Script Name</label>
                <input type="text" id="scriptName" required placeholder="e.g., ByokuXMon Hub">
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea id="scriptDesc" placeholder="Deskripsi script..."></textarea>
            </div>
            <div class="form-group">
                <label>Category</label>
                <input type="text" id="scriptCategory" required placeholder="e.g., Utility, Combat">
            </div>
            <div class="form-group">
                <label>Loadstring (Script yang akan dieksekusi)</label>
                <textarea id="scriptCode" required placeholder='loadstring(game:HttpGet("https://raw.githubusercontent.com/..."))()'></textarea>
                <small style="color:#666; font-size:11px;">User hanya bisa copy/execute, tidak bisa lihat isi raw</small>
            </div>
            <div class="form-group">
                <label>Icon (Font Awesome)</label>
                <input type="text" id="scriptIcon" placeholder="fa-robot, fa-dragon, fa-skull">
            </div>
            <button type="submit" class="btn-primary">Save Script</button>
            <button type="button" id="cancelEdit" class="btn-secondary">Cancel Edit</button>
        </form>

        <hr style="margin: 30px 0; border-color:#333;">

        <h3 style="margin-bottom: 20px;">Manage Scripts</h3>
        <div class="scripts-table">
            <table>
                <thead>
                    <tr><th>Name</th><th>Category</th><th>Executes</th><th>Actions</th></tr>
                </thead>
                <tbody id="adminScriptsList"></tbody>
            </table>
        </div>
    </div>

    <div class="toast" id="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toastMsg">Copied!</span>
    </div>

    <script>
        // ============================================
        // SECURE SCRIPT STORAGE (ENCRYPTED LOCALSTORAGE)
        // ============================================
        
        let scripts = [];
        let favorites = new Set();
        let isAdmin = false;
        let currentFilter = "all";
        let searchQuery = "";
        
        // Admin password (GANTI SESUAI KEHENDAK LU)
        const ADMIN_PASSWORD = "ByokuXMon2024";

        // Simple XOR Encryption buat nyimpen script biar aman
        function encrypt(text, key = "ByokuXMonSecretKey2024") {
            let result = "";
            for (let i = 0; i < text.length; i++) {
                result += String.fromCharCode(text.charCodeAt(i) ^ key.charCodeAt(i % key.length));
            }
            return btoa(result);
        }

        function decrypt(encrypted, key = "ByokuXMonSecretKey2024") {
            try {
                let text = atob(encrypted);
                let result = "";
                for (let i = 0; i < text.length; i++) {
                    result += String.fromCharCode(text.charCodeAt(i) ^ key.charCodeAt(i % key.length));
                }
                return result;
            } catch(e) {
                return "";
            }
        }

        // Default scripts (terenkripsi otomatis)
        const defaultScripts = [
            {
                id: "1",
                name: "🎬 Record & Playback System",
                description: "Sistem recording canggih dengan WindUI. Rekam gerakan, playback, merge, share ke Discord!",
                category: "Recording",
                icon: "fa-video",
                executes: 0,
                loadstring: 'loadstring(game:HttpGet("https://raw.githubusercontent.com/ByokuXMon/RecordPlayback/main/script.lua"))()'
            },
            {
                id: "2",
                name: "⚔️ Auto Farm Pro",
                description: "Auto farm terbaik dengan GUI modern. Support teleport, auto collect, anti AFK, multi-farm.",
                category: "Farming",
                icon: "fa-tractor",
                executes: 0,
                loadstring: 'loadstring(game:HttpGet("https://raw.githubusercontent.com/ByokuXMon/AutoFarm/main/farm.lua"))()'
            },
            {
                id: "3",
                name: "🎯 Aimbot + ESP",
                description: "Aimbot akurat 100% + ESP lengkap. Support silent aim, wallbang, visibility check.",
                category: "Combat",
                icon: "fa-crosshairs",
                executes: 0,
                loadstring: 'loadstring(game:HttpGet("https://raw.githubusercontent.com/ByokuXMon/Aimbot/main/aimbot.lua"))()'
            },
            {
                id: "4",
                name: "👑 Admin GUI",
                description: "Admin command GUI lengkap: Kick, Ban, Tp, Kill, Freeze, Jail, dan 50+ command lainnya.",
                category: "Admin",
                icon: "fa-user-shield",
                executes: 0,
                loadstring: 'loadstring(game:HttpGet("https://raw.githubusercontent.com/ByokuXMon/AdminGUI/main/admin.lua"))()'
            },
            {
                id: "5",
                name: "🚀 Speed Hub",
                description: "Speed boost, fly, noclip, infinite jump, dan berbagai mobility features.",
                category: "Movement",
                icon: "fa-rocket",
                executes: 0,
                loadstring: 'loadstring(game:HttpGet("https://raw.githubusercontent.com/ByokuXMon/SpeedHub/main/speed.lua"))()'
            }
        ];

        // Load data dari localStorage (terenkripsi)
        function loadData() {
            try {
                const encryptedData = localStorage.getItem("byokuxmon_secure_scripts");
                if (encryptedData) {
                    const decrypted = decrypt(encryptedData);
                    scripts = JSON.parse(decrypted);
                } else {
                    scripts = JSON.parse(JSON.stringify(defaultScripts));
                    saveData();
                }
            } catch(e) {
                scripts = JSON.parse(JSON.stringify(defaultScripts));
            }

            const favData = localStorage.getItem("byokuxmon_favorites");
            if (favData) {
                favorites = new Set(JSON.parse(favData));
            }

            updateStats();
            renderFilters();
            renderScripts();
            renderAdminList();
        }

        function saveData() {
            try {
                const encrypted = encrypt(JSON.stringify(scripts));
                localStorage.setItem("byokuxmon_secure_scripts", encrypted);
                localStorage.setItem("byokuxmon_favorites", JSON.stringify([...favorites]));
            } catch(e) {}
            updateStats();
        }

        function updateStats() {
            document.getElementById("totalScripts").innerText = scripts.length;
            document.getElementById("totalFavorites").innerText = favorites.size;
            const uniqueCats = [...new Set(scripts.map(s => s.category))];
            document.getElementById("totalCategories").innerText = uniqueCats.length;
            const totalExecutes = scripts.reduce((sum, s) => sum + (s.executes || 0), 0);
            document.getElementById("totalExecutes").innerText = totalExecutes;
        }

        function renderFilters() {
            const cats = ["all", ...new Set(scripts.map(s => s.category))];
            const container = document.getElementById("filtersContainer");
            container.innerHTML = cats.map(cat => `
                <button class="filter ${currentFilter === cat ? 'active' : ''}" data-cat="${cat}">
                    ${cat === "all" ? "📋 All" : cat}
                </button>
            `).join("");
            
            document.querySelectorAll(".filter").forEach(btn => {
                btn.addEventListener("click", () => {
                    currentFilter = btn.dataset.cat;
                    renderFilters();
                    renderScripts();
                });
            });
        }

        function renderScripts() {
            const grid = document.getElementById("scriptsGrid");
            let filtered = scripts.filter(s => {
                const matchCat = currentFilter === "all" || s.category === currentFilter;
                const matchSearch = s.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
                                    s.description.toLowerCase().includes(searchQuery.toLowerCase());
                return matchCat && matchSearch;
            });
            
            if (filtered.length === 0) {
                grid.innerHTML = `<div class="empty-state"><i class="fas fa-inbox"></i><p>Tidak ada script ditemukan</p></div>`;
                return;
            }
            
            grid.innerHTML = filtered.map(script => `
                <div class="script-card">
                    <div class="card-header">
                        <h3><i class="fas ${script.icon || 'fa-scroll'}"></i> ${escapeHtml(script.name)}</h3>
                        <span class="badge">${escapeHtml(script.category)}</span>
                    </div>
                    <div class="card-desc">${escapeHtml(script.description)}</div>
                    <div class="loadstring-area">
                        <pre>${escapeHtml(script.loadstring.substring(0, 80))}${script.loadstring.length > 80 ? '...' : ''}</pre>
                        <button class="copy-loadstring" data-code="${escapeHtml(script.loadstring)}">Copy</button>
                    </div>
                    <div class="card-actions">
                        <button class="btn-execute" data-code="${escapeHtml(script.loadstring)}" data-id="${script.id}">
                            <i class="fas fa-play"></i> Execute
                        </button>
                        <button class="btn-favorite ${favorites.has(script.id) ? 'active' : ''}" data-id="${script.id}">
                            <i class="fas ${favorites.has(script.id) ? 'fa-star' : 'fa-star-o'}"></i>
                        </button>
                    </div>
                    <div class="card-footer">
                        <span><i class="fas fa-download"></i> ${script.executes || 0} executes</span>
                        <span><i class="fas fa-lock"></i> Secure</span>
                    </div>
                </div>
            `).join("");
            
            // Copy button
            document.querySelectorAll(".copy-loadstring").forEach(btn => {
                btn.addEventListener("click", () => {
                    const code = btn.dataset.code;
                    navigator.clipboard.writeText(code);
                    showToast("Loadstring copied to clipboard!");
                });
            });
            
            // Execute button
            document.querySelectorAll(".btn-execute").forEach(btn => {
                btn.addEventListener("click", () => {
                    const code = btn.dataset.code;
                    const id = btn.dataset.id;
                    navigator.clipboard.writeText(code);
                    
                    // Increment execute count
                    const script = scripts.find(s => s.id === id);
                    if (script) {
                        script.executes = (script.executes || 0) + 1;
                        saveData();
                        renderScripts();
                    }
                    
                    showToast("Loadstring copied! Paste ke executor kamu.");
                });
            });
            
            // Favorite button
            document.querySelectorAll(".btn-favorite").forEach(btn => {
                btn.addEventListener("click", () => {
                    const id = btn.dataset.id;
                    if (favorites.has(id)) {
                        favorites.delete(id);
                    } else {
                        favorites.add(id);
                    }
                    saveData();
                    renderScripts();
                });
            });
        }

        function renderAdminList() {
            const tbody = document.getElementById("adminScriptsList");
            tbody.innerHTML = scripts.map(script => `
                <tr>
                    <td>${escapeHtml(script.name)}</td>
                    <td>${escapeHtml(script.category)}</td>
                    <td>${script.executes || 0}</td>
                    <td>
                        <button class="edit-script" data-id="${script.id}">Edit</button>
                        <button class="delete-script" data-id="${script.id}">Del</button>
                    </td>
                </tr>
            `).join("");
            
            document.querySelectorAll(".edit-script").forEach(btn => {
                btn.addEventListener("click", () => {
                    const script = scripts.find(s => s.id === btn.dataset.id);
                    if (script) {
                        document.getElementById("editId").value = script.id;
                        document.getElementById("scriptName").value = script.name;
                        document.getElementById("scriptDesc").value = script.description;
                        document.getElementById("scriptCategory").value = script.category;
                        document.getElementById("scriptCode").value = script.loadstring;
                        document.getElementById("scriptIcon").value = script.icon || "";
                    }
                });
            });
            
            document.querySelectorAll(".delete-script").forEach(btn => {
                btn.addEventListener("click", () => {
                    if (confirm("Yakin hapus script ini?")) {
                        const index = scripts.findIndex(s => s.id === btn.dataset.id);
                        if (index !== -1) {
                            scripts.splice(index, 1);
                            saveData();
                            renderFilters();
                            renderScripts();
                            renderAdminList();
                            showToast("Script deleted!");
                        }
                    }
                });
            });
        }

        // Form handler
        document.getElementById("scriptForm").addEventListener("submit", (e) => {
            e.preventDefault();
            
            const editId = document.getElementById("editId").value;
            const name = document.getElementById("scriptName").value;
            const desc = document.getElementById("scriptDesc").value;
            const category = document.getElementById("scriptCategory").value;
            const code = document.getElementById("scriptCode").value;
            const icon = document.getElementById("scriptIcon").value || "fa-scroll";
            
            if (!name || !category || !code) {
                showToast("Mohon isi semua field yang diperlukan!");
                return;
            }
            
            if (editId) {
                const index = scripts.findIndex(s => s.id === editId);
                if (index !== -1) {
                    scripts[index] = { ...scripts[index], name, description: desc, category, loadstring: code, icon };
                }
            } else {
                scripts.push({
                    id: Date.now().toString(),
                    name, description: desc, category, loadstring: code, icon, executes: 0
                });
            }
            
            saveData();
            document.getElementById("editId").value = "";
            document.getElementById("scriptForm").reset();
            renderFilters();
            renderScripts();
            renderAdminList();
            showToast(editId ? "Script updated!" : "Script added!");
        });
        
        document.getElementById("cancelEdit").addEventListener("click", () => {
            document.getElementById("editId").value = "";
            document.getElementById("scriptForm").reset();
        });
        
        // Admin panel
        const adminBtn = document.getElementById("adminBtn");
        const adminPanel = document.getElementById("adminPanel");
        const overlay = document.getElementById("overlay");
        const closeAdmin = document.getElementById("closeAdmin");
        
        adminBtn.addEventListener("click", () => {
            if (!isAdmin) {
                const pwd = prompt("🔐 Enter Admin Password:");
                if (pwd === ADMIN_PASSWORD) {
                    isAdmin = true;
                    adminBtn.classList.add("active");
                    adminPanel.classList.add("open");
                    overlay.classList.add("show");
                    showToast("Admin mode activated!");
                } else {
                    showToast("Wrong password!");
                }
            } else {
                isAdmin = false;
                adminBtn.classList.remove("active");
                adminPanel.classList.remove("open");
                overlay.classList.remove("show");
                showToast("Admin mode deactivated!");
            }
        });
        
        function closeAdminPanel() {
            adminPanel.classList.remove("open");
            overlay.classList.remove("show");
        }
        
        closeAdmin.addEventListener("click", closeAdminPanel);
        overlay.addEventListener("click", closeAdminPanel);
        
        // Search
        document.getElementById("searchInput").addEventListener("input", (e) => {
            searchQuery = e.target.value;
            renderScripts();
        });
        
        function showToast(msg) {
            const toast = document.getElementById("toast");
            document.getElementById("toastMsg").innerText = msg;
            toast.classList.add("show");
            setTimeout(() => toast.classList.remove("show"), 2000);
        }
        
        function escapeHtml(str) {
            if (!str) return "";
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        // Init
        loadData();
    </script>
</body>
</html>
