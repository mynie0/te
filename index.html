<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>RobloxScriptHub | Professional Admin Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background: #0a0a0f;
    font-family: 'Inter', sans-serif;
    color: #e0e0e0;
    overflow-x: hidden;
  }

  /* Premium Glassmorphism Navbar */
  .navbar {
    background: rgba(10, 10, 20, 0.95);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(0, 245, 255, 0.1);
    padding: 16px 32px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .nav-container {
    max-width: 1400px;
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 20px;
  }

  .logo h1 {
    font-family: 'Orbitron', monospace;
    font-size: 1.8rem;
    background: linear-gradient(135deg, #00f5ff, #ff2d78, #39ff14);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  .logo p {
    font-size: 0.7rem;
    color: #6060aa;
    letter-spacing: 2px;
  }

  .admin-badge {
    background: linear-gradient(135deg, #ff2d78, #bf00ff);
    padding: 8px 20px;
    border-radius: 30px;
    font-weight: 600;
    font-size: 0.85rem;
    border: none;
    cursor: pointer;
    transition: all 0.3s;
    color: white;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .admin-badge:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px rgba(255, 45, 120, 0.4);
  }

  .admin-badge.user-mode {
    background: linear-gradient(135deg, #00f5ff, #0088aa);
  }

  /* Main Container */
  .main-container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 32px;
  }

  /* Search & Filter */
  .search-section {
    margin-bottom: 32px;
  }

  .search-bar {
    display: flex;
    gap: 16px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .search-input {
    flex: 1;
    background: #151525;
    border: 1px solid #2a2a40;
    border-radius: 12px;
    padding: 14px 20px;
    color: white;
    font-size: 0.95rem;
    transition: all 0.3s;
  }

  .search-input:focus {
    outline: none;
    border-color: #00f5ff;
    box-shadow: 0 0 10px rgba(0, 245, 255, 0.2);
  }

  .filter-group {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .filter-btn {
    background: #151525;
    border: 1px solid #2a2a40;
    padding: 10px 24px;
    border-radius: 30px;
    cursor: pointer;
    transition: all 0.3s;
    font-weight: 500;
    color: #a0a0c0;
  }

  .filter-btn.active {
    background: linear-gradient(135deg, #00f5ff20, #0088aa20);
    border-color: #00f5ff;
    color: #00f5ff;
  }

  .filter-btn:hover {
    border-color: #ff2d78;
  }

  /* Stats */
  .stats-row {
    display: flex;
    gap: 20px;
    margin-bottom: 32px;
    flex-wrap: wrap;
  }

  .stat-card {
    background: #151525;
    border-radius: 16px;
    padding: 16px 24px;
    border: 1px solid #2a2a40;
    min-width: 150px;
  }

  .stat-card .number {
    font-size: 2rem;
    font-weight: 700;
    color: #00f5ff;
  }

  .stat-card .label {
    font-size: 0.8rem;
    color: #8080aa;
    margin-top: 5px;
  }

  /* Script Grid */
  .scripts-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
    gap: 24px;
  }

  .script-card {
    background: #151525;
    border: 1px solid #2a2a40;
    border-radius: 20px;
    overflow: hidden;
    transition: all 0.3s;
  }

  .script-card:hover {
    transform: translateY(-4px);
    border-color: #00f5ff40;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
  }

  .card-image {
    width: 100%;
    height: 160px;
    object-fit: cover;
    background: #0f0f1a;
  }

  .card-content {
    padding: 20px;
  }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: start;
    margin-bottom: 12px;
  }

  .card-title {
    font-size: 1.2rem;
    font-weight: 700;
    color: white;
  }

  .tag {
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.7rem;
    font-weight: 600;
  }

  .tag-free { background: rgba(57, 255, 20, 0.15); color: #39ff14; border: 1px solid #39ff1440; }
  .tag-keyless { background: rgba(0, 245, 255, 0.15); color: #00f5ff; border: 1px solid #00f5ff40; }
  .tag-paid { background: rgba(255, 230, 0, 0.15); color: #ffe600; border: 1px solid #ffe60040; }

  .card-game {
    color: #bf00ff;
    font-size: 0.75rem;
    margin-bottom: 10px;
    font-family: monospace;
  }

  .card-desc {
    color: #a0a0c0;
    font-size: 0.85rem;
    line-height: 1.5;
    margin-bottom: 15px;
  }

  .features {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 20px;
  }

  .feature {
    background: #0a0a12;
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 0.7rem;
    color: #8080bb;
    border: 1px solid #2a2a40;
  }

  .card-actions {
    display: flex;
    gap: 12px;
  }

  .btn-copy, .btn-raw {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    font-weight: 600;
    font-size: 0.75rem;
    cursor: pointer;
    transition: all 0.3s;
    text-align: center;
    background: transparent;
  }

  .btn-copy { border: 1px solid #00f5ff; color: #00f5ff; }
  .btn-raw { border: 1px solid #ff2d78; color: #ff2d78; }
  .btn-copy:hover, .btn-raw:hover { transform: scale(0.98); }

  /* Admin Modal */
  .modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.85);
    backdrop-filter: blur(12px);
    z-index: 1000;
    display: none;
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.active {
    display: flex;
  }

  .modal-container {
    background: #12121a;
    border: 1px solid #2a2a40;
    border-radius: 24px;
    width: 90%;
    max-width: 700px;
    max-height: 85vh;
    overflow-y: auto;
  }

  .modal-header {
    padding: 20px 24px;
    border-bottom: 1px solid #2a2a40;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .modal-header h3 {
    color: #00f5ff;
  }

  .modal-close {
    background: none;
    border: none;
    color: white;
    font-size: 24px;
    cursor: pointer;
  }

  .modal-body {
    padding: 24px;
  }

  .form-group {
    margin-bottom: 20px;
  }

  .form-group label {
    display: block;
    margin-bottom: 8px;
    font-size: 0.8rem;
    font-weight: 600;
    color: #00f5ff;
  }

  .form-group input, .form-group textarea, .form-group select {
    width: 100%;
    background: #0a0a12;
    border: 1px solid #2a2a40;
    border-radius: 12px;
    padding: 12px 16px;
    color: white;
    font-size: 0.9rem;
  }

  .form-group input:focus, .form-group textarea:focus {
    outline: none;
    border-color: #ff2d78;
  }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  .image-preview {
    margin-top: 10px;
    max-width: 100%;
    max-height: 120px;
    border-radius: 12px;
    display: none;
  }

  .btn-submit {
    background: linear-gradient(135deg, #39ff14, #00aa00);
    border: none;
    padding: 14px;
    border-radius: 12px;
    font-weight: 700;
    color: white;
    cursor: pointer;
    width: 100%;
    font-size: 1rem;
  }

  .btn-danger {
    background: linear-gradient(135deg, #ff2d78, #aa0033);
  }

  .scripts-list {
    max-height: 400px;
    overflow-y: auto;
  }

  .script-item {
    background: #0a0a12;
    border-radius: 12px;
    padding: 12px 16px;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .script-info h4 {
    font-size: 0.9rem;
    margin-bottom: 4px;
  }

  .script-info p {
    font-size: 0.7rem;
    color: #8080aa;
  }

  .icon-btn {
    background: transparent;
    border: 1px solid #2a2a40;
    padding: 6px 12px;
    border-radius: 8px;
    color: white;
    cursor: pointer;
    margin-left: 8px;
  }

  .icon-btn:hover {
    border-color: #00f5ff;
  }

  .empty-state {
    text-align: center;
    padding: 60px;
    color: #6060aa;
  }

  @media (max-width: 768px) {
    .main-container { padding: 20px; }
    .scripts-grid { grid-template-columns: 1fr; }
    .form-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<nav class="navbar">
  <div class="nav-container">
    <div class="logo">
      <h1>RobloxScriptHub</h1>
      <p>PREMIUM SCRIPTS COLLECTION</p>
    </div>
    <button class="admin-badge" id="adminBtn">
      <i class="fas fa-crown"></i> <span id="adminBtnText">ADMIN PANEL</span>
    </button>
  </div>
</nav>

<main class="main-container" id="mainContent"></main>

<!-- Admin Modal -->
<div class="modal-overlay" id="adminModal">
  <div class="modal-container">
    <div class="modal-header">
      <h3><i class="fas fa-tools"></i> Admin Control Panel</h3>
      <button class="modal-close" id="closeAdminModal">&times;</button>
    </div>
    <div class="modal-body" id="adminModalBody"></div>
  </div>
</div>

<!-- Raw Modal -->
<div class="modal-overlay" id="rawModal">
  <div class="modal-container">
    <div class="modal-header">
      <h3 id="rawTitle">Raw Script</h3>
      <button class="modal-close" id="closeRawModal">&times;</button>
    </div>
    <div class="modal-body">
      <pre id="rawContent" style="background:#0a0a12; padding:16px; border-radius:12px; overflow-x:auto; font-size:0.75rem; font-family:monospace;"></pre>
      <button id="copyRawBtn" style="margin-top:16px; width:100%;" class="btn-submit">📋 Copy to Clipboard</button>
    </div>
  </div>
</div>

<script>
  // ========== DEFAULT SCRIPTS ==========
  const defaultScripts = [
    { id: 1, title: "Wonder Chase V3", game: "WONDER CHASE OBBY", desc: "Auto play obby dengan portal teleportation, sticker & pickup collection, anti-replay otomatis.", tag: "free", features: ["Auto Portal", "Pickup Collect", "Anti-AFK", "Auto Replay"], image: "", code: `-- Wonder Chase V3 | RobloxScriptHub\nlocal Players = game:GetService("Players")\nlocal VirtualUser = game:GetService("VirtualUser")\nlocal lp = Players.LocalPlayer\nlp.Idled:Connect(function() VirtualUser:Button2Down(Vector2.new(0,0), workspace.CurrentCamera.CFrame) task.wait(1) VirtualUser:Button2Up(Vector2.new(0,0), workspace.CurrentCamera.CFrame) end)\nprint("[WonderChase] Loaded")` },
    { id: 2, title: "Orb Collector ESP", game: "ANY GAME (ORB)", desc: "Auto collect semua orb di workspace dengan ESP BillboardGui RGB, FPS booster, dan distance display.", tag: "keyless", features: ["Auto Collect", "ESP RGB", "FPS Boost"], image: "", code: `-- Orb Collector ESP\nlocal RunService = game:GetService("RunService")\ngetgenv().OrbESP = true\nRunService.Heartbeat:Connect(function()\n    for _, obj in pairs(workspace:GetDescendants()) do\n        if obj:IsA("BasePart") and obj.Name:lower():find("orb") then\n            firetouchinterest(game.Players.LocalPlayer.Character.HumanoidRootPart, obj, 0)\n        end\n    end\nend)` },
    { id: 3, title: "Checkpoint Farmer", game: "BADGE / OBBY GAME", desc: "Auto teleport ke semua checkpoint dan farming badge dengan loop otomatis.", tag: "free", features: ["Auto TP", "Badge Farm"], image: "", code: `-- Checkpoint Farmer\nlocal lp = game.Players.LocalPlayer\nlocal hrp = lp.Character.HumanoidRootPart\ngetgenv().CheckpointFarm = true\nwhile getgenv().CheckpointFarm do\n    for i=1,999 do\n        local cp = workspace:FindFirstChild("ClearStage"..i)\n        if cp and cp:FindFirstChildWhichIsA("BasePart") then hrp.CFrame = cp:FindFirstChildWhichIsA("BasePart").CFrame end\n    end\n    task.wait(1)\nend` },
    { id: 4, title: "Inf Point Clicker", game: "ECLIPSE JOIN & CLAIM", desc: "Infinite Point dengan FireServer AddPoint dan WalkSpeed boost.", tag: "keyless", features: ["Inf Points", "WalkSpeed 50"], image: "", code: `-- Inf Point\nlocal RunService = game:GetService("RunService")\ngetgenv().InfPoint = true\nRunService.Heartbeat:Connect(function()\n    if getgenv().InfPoint then\n        game.Players.LocalPlayer.Character.Humanoid.WalkSpeed = 50\n        pcall(function() game:GetService("ReplicatedStorage"):WaitChild("AddPoint"):FireServer() end)\n    end\nend)` },
    { id: 5, title: "UGC Auto Claim", game: "EVENT / UGC GAME", desc: "Auto collect UGC item dan fire DJ remote.", tag: "free", features: ["Auto Collect", "Fire Remote"], image: "", code: `-- UGC Auto Claim\nlocal RS = game:GetService("ReplicatedStorage")\ngetgenv().UGCClaim = true\nwhile getgenv().UGCClaim do\n    pcall(function() RS.Remotes.RequestDJ:FireServer() end)\n    task.wait(0.5)\nend` },
    { id: 6, title: "Anti Lag Ultimate", game: "ALL GAMES", desc: "Optimasi performa Roblox: low quality, no shadow, no fog.", tag: "free", features: ["Low Quality", "No Shadow"], image: "", code: `-- Anti Lag Ultimate\nsettings().Rendering.QualityLevel = 1\ngame:GetService("Lighting").GlobalShadows = false\nprint("AntiLag Applied")` }
  ];

  let scripts = [];
  let isAdmin = false;
  let activeFilter = "all";
  let searchQuery = "";

  // Load data
  function loadData() {
    const stored = localStorage.getItem("RBSH_Data");
    if (stored) {
      try {
        scripts = JSON.parse(stored);
        if (!Array.isArray(scripts)) throw new Error();
      } catch(e) { scripts = JSON.parse(JSON.stringify(defaultScripts)); }
    } else {
      scripts = JSON.parse(JSON.stringify(defaultScripts));
    }
    scripts.forEach((s, i) => { if (!s.id) s.id = Date.now() + i; });
    saveData();
  }

  function saveData() { localStorage.setItem("RBSH_Data", JSON.stringify(scripts)); }

  // Check admin session (tidak perlu login ulang)
  function checkAdminSession() {
    const saved = localStorage.getItem("RBSH_Admin");
    if (saved === "true") {
      isAdmin = true;
      document.getElementById("adminBtn").classList.add("user-mode");
      document.getElementById("adminBtnText").innerHTML = "👑 ADMIN MODE";
    } else {
      isAdmin = false;
      document.getElementById("adminBtn").classList.remove("user-mode");
      document.getElementById("adminBtnText").innerHTML = "🔐 ADMIN PANEL";
    }
  }

  function setAdminMode(value) {
    isAdmin = value;
    localStorage.setItem("RBSH_Admin", value);
    if (value) {
      document.getElementById("adminBtn").classList.add("user-mode");
      document.getElementById("adminBtnText").innerHTML = "👑 ADMIN MODE";
    } else {
      document.getElementById("adminBtn").classList.remove("user-mode");
      document.getElementById("adminBtnText").innerHTML = "🔐 ADMIN PANEL";
    }
    render();
  }

  // Render Main View
  function render() {
    const container = document.getElementById("mainContent");
    if (isAdmin) {
      container.innerHTML = renderUserView();
      attachUserEvents();
      openAdminModal();
    } else {
      container.innerHTML = renderUserView();
      attachUserEvents();
    }
  }

  function renderUserView() {
    let filtered = scripts.filter(s => {
      if (activeFilter !== "all" && s.tag !== activeFilter) return false;
      if (searchQuery && !s.title.toLowerCase().includes(searchQuery) && !s.game.toLowerCase().includes(searchQuery)) return false;
      return true;
    });

    const freeCount = scripts.filter(s => s.tag === "free").length;
    const keylessCount = scripts.filter(s => s.tag === "keyless").length;
    const paidCount = scripts.filter(s => s.tag === "paid").length;

    return `
      <div class="search-section">
        <div class="search-bar">
          <input type="text" class="search-input" id="searchInput" placeholder="🔍 Cari script atau game..." value="${searchQuery}">
        </div>
        <div class="filter-group" id="filterGroup">
          <button class="filter-btn ${activeFilter === 'all' ? 'active' : ''}" data-filter="all">ALL</button>
          <button class="filter-btn ${activeFilter === 'free' ? 'active' : ''}" data-filter="free">FREE</button>
          <button class="filter-btn ${activeFilter === 'keyless' ? 'active' : ''}" data-filter="keyless">KEYLESS</button>
          <button class="filter-btn ${activeFilter === 'paid' ? 'active' : ''}" data-filter="paid">PAID</button>
        </div>
      </div>

      <div class="stats-row">
        <div class="stat-card"><div class="number">${scripts.length}</div><div class="label">Total Scripts</div></div>
        <div class="stat-card"><div class="number">${freeCount}</div><div class="label">FREE</div></div>
        <div class="stat-card"><div class="number">${keylessCount}</div><div class="label">KEYLESS</div></div>
        <div class="stat-card"><div class="number">${paidCount}</div><div class="label">PAID</div></div>
        <div class="stat-card"><div class="number">${filtered.length}</div><div class="label">Shown</div></div>
      </div>

      <div class="scripts-grid" id="scriptsGrid">
        ${filtered.map((s, idx) => `
          <div class="script-card" data-id="${s.id}">
            ${s.image ? `<img class="card-image" src="${escapeHtml(s.image)}" onerror="this.style.display='none'">` : ''}
            <div class="card-content">
              <div class="card-header">
                <span class="card-title">${escapeHtml(s.title)}</span>
                <span class="tag tag-${s.tag}">${s.tag.toUpperCase()}</span>
              </div>
              <div class="card-game">📁 ${escapeHtml(s.game)}</div>
              <div class="card-desc">${escapeHtml(s.desc)}</div>
              <div class="features">${s.features.map(f => `<span class="feature">${escapeHtml(f)}</span>`).join('')}</div>
              <div class="card-actions">
                <button class="btn-copy" data-idx="${idx}"><i class="fas fa-copy"></i> COPY</button>
                <button class="btn-raw" data-idx="${idx}"><i class="fas fa-code"></i> RAW</button>
              </div>
            </div>
          </div>
        `).join('')}
        ${filtered.length === 0 ? '<div class="empty-state"><i class="fas fa-search"></i><br>Tidak ada script yang ditemukan</div>' : ''}
      </div>
    `;
  }

  function attachUserEvents() {
    // Search
    const searchInput = document.getElementById("searchInput");
    if (searchInput) {
      searchInput.addEventListener("input", (e) => { searchQuery = e.target.value.toLowerCase(); render(); });
    }
    // Filters
    document.querySelectorAll("#filterGroup .filter-btn").forEach(btn => {
      btn.addEventListener("click", () => { activeFilter = btn.dataset.filter; render(); });
    });
    // Copy & Raw buttons
    document.querySelectorAll(".btn-copy").forEach(btn => {
      btn.addEventListener("click", (e) => {
        const idx = parseInt(btn.dataset.idx);
        let filtered = getFilteredScripts();
        navigator.clipboard.writeText(filtered[idx].code);
        btn.innerHTML = '<i class="fas fa-check"></i> COPIED!';
        setTimeout(() => btn.innerHTML = '<i class="fas fa-copy"></i> COPY', 1500);
      });
    });
    document.querySelectorAll(".btn-raw").forEach(btn => {
      btn.addEventListener("click", (e) => {
        const idx = parseInt(btn.dataset.idx);
        let filtered = getFilteredScripts();
        document.getElementById("rawTitle").innerHTML = `RAW - ${filtered[idx].title}`;
        document.getElementById("rawContent").innerText = filtered[idx].code;
        document.getElementById("rawModal").classList.add("active");
      });
    });
  }

  function getFilteredScripts() {
    return scripts.filter(s => {
      if (activeFilter !== "all" && s.tag !== activeFilter) return false;
      if (searchQuery && !s.title.toLowerCase().includes(searchQuery) && !s.game.toLowerCase().includes(searchQuery)) return false;
      return true;
    });
  }

  // Admin Modal
  function openAdminModal() {
    const modalBody = document.getElementById("adminModalBody");
    modalBody.innerHTML = `
      <div style="margin-bottom: 24px;">
        <button id="logoutAdminBtn" class="btn-submit btn-danger" style="width:auto; padding:10px 20px;"><i class="fas fa-sign-out-alt"></i> LOGOUT</button>
        <hr style="margin: 20px 0; border-color:#2a2a40;">
      </div>

      <h4 style="margin-bottom: 16px;"><i class="fas fa-plus-circle"></i> Tambah / Edit Script</h4>
      <form id="adminForm">
        <input type="hidden" id="editId">
        <div class="form-group"><label>JUDUL SCRIPT *</label><input type="text" id="formTitle" required placeholder="Wonder Chase V3"></div>
        <div class="form-group"><label>NAMA GAME *</label><input type="text" id="formGame" required placeholder="WONDER CHASE OBBY"></div>
        <div class="form-group"><label>DESKRIPSI</label><textarea id="formDesc" rows="2" placeholder="Deskripsi script..."></textarea></div>
        <div class="form-row">
          <div class="form-group"><label>TAG</label><select id="formTag"><option value="free">FREE</option><option value="keyless">KEYLESS</option><option value="paid">PAID</option></select></div>
          <div class="form-group"><label>FITUR (pisah koma)</label><input type="text" id="formFeatures" placeholder="Auto Farm, ESP"></div>
        </div>
        <div class="form-group"><label>🎨 IMAGE URL (opsional)</label><input type="text" id="formImage" placeholder="https://..."><img id="imagePreview" class="image-preview"></div>
        <div class="form-group"><label>💻 LUA SCRIPT CODE *</label><textarea id="formCode" rows="6" placeholder="-- script lua disini..."></textarea></div>
        <button type="submit" class="btn-submit"><i class="fas fa-save"></i> SAVE SCRIPT</button>
        <button type="button" id="cancelFormBtn" class="btn-submit btn-danger" style="margin-top:10px;">BATAL</button>
      </form>

      <hr style="margin: 30px 0; border-color:#2a2a40;">

      <h4 style="margin-bottom: 16px;"><i class="fas fa-list"></i> Daftar Script (${scripts.length})</h4>
      <div class="scripts-list" id="adminScriptsList">
        ${scripts.map(s => `
          <div class="script-item" data-id="${s.id}">
            <div class="script-info"><h4>${escapeHtml(s.title)}</h4><p>${escapeHtml(s.game)} | ${s.tag}</p></div>
            <div><button class="icon-btn edit-script" data-id="${s.id}"><i class="fas fa-edit"></i></button><button class="icon-btn delete-script" data-id="${s.id}"><i class="fas fa-trash"></i></button></div>
          </div>
        `).join('')}
      </div>
    `;

    // Attach admin events
    document.getElementById("adminForm").addEventListener("submit", (e) => {
      e.preventDefault();
      const editId = document.getElementById("editId").value;
      const newScript = {
        id: editId ? parseInt(editId) : Date.now(),
        title: document.getElementById("formTitle").value.trim(),
        game: document.getElementById("formGame").value.trim(),
        desc: document.getElementById("formDesc").value.trim(),
        tag: document.getElementById("formTag").value,
        features: document.getElementById("formFeatures").value.split(",").map(f => f.trim()).filter(f => f),
        image: document.getElementById("formImage").value.trim(),
        code: document.getElementById("formCode").value
      };
      if (!newScript.title || !newScript.game || !newScript.code) { alert("Judul, Game, dan Code wajib diisi!"); return; }
      if (editId) {
        const idx = scripts.findIndex(s => s.id == editId);
        if (idx !== -1) scripts[idx] = newScript;
      } else { scripts.push(newScript); }
      saveData();
      render();
      openAdminModal();
    });

    document.getElementById("cancelFormBtn").addEventListener("click", () => {
      document.getElementById("editId").value = "";
      document.getElementById("formTitle").value = "";
      document.getElementById("formGame").value = "";
      document.getElementById("formDesc").value = "";
      document.getElementById("formTag").value = "free";
      document.getElementById("formFeatures").value = "";
      document.getElementById("formImage").value = "";
      document.getElementById("formCode").value = "";
      document.getElementById("imagePreview").style.display = "none";
    });

    document.getElementById("logoutAdminBtn").addEventListener("click", () => {
      setAdminMode(false);
      document.getElementById("adminModal").classList.remove("active");
    });

    document.getElementById("formImage").addEventListener("input", (e) => {
      const preview = document.getElementById("imagePreview");
      if (e.target.value) { preview.src = e.target.value; preview.style.display = "block"; }
      else { preview.style.display = "none"; }
    });

    document.querySelectorAll(".edit-script").forEach(btn => {
      btn.addEventListener("click", () => {
        const id = parseInt(btn.dataset.id);
        const s = scripts.find(sc => sc.id === id);
        if (s) {
          document.getElementById("editId").value = s.id;
          document.getElementById("formTitle").value = s.title;
          document.getElementById("formGame").value = s.game;
          document.getElementById("formDesc").value = s.desc;
          document.getElementById("formTag").value = s.tag;
          document.getElementById("formFeatures").value = s.features.join(", ");
          document.getElementById("formImage").value = s.image || "";
          document.getElementById("formCode").value = s.code;
          if (s.image) { document.getElementById("imagePreview").src = s.image; document.getElementById("imagePreview").style.display = "block"; }
        }
      });
    });

    document.querySelectorAll(".delete-script").forEach(btn => {
      btn.addEventListener("click", () => {
        if (confirm("Yakin hapus script ini?")) {
          const id = parseInt(btn.dataset.id);
          scripts = scripts.filter(s => s.id !== id);
          saveData();
          render();
          openAdminModal();
        }
      });
    });

    document.getElementById("adminModal").classList.add("active");
  }

  function escapeHtml(str) { if (!str) return ""; return str.replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }

  // Modal handlers
  document.getElementById("adminBtn").addEventListener("click", () => {
    if (isAdmin) {
      openAdminModal();
    } else {
      const pwd = prompt("🔐 Masukkan password admin:", "");
      if (pwd === "admin123") {
        setAdminMode(true);
        render();
        openAdminModal();
      } else if (pwd !== null) { alert("Password salah!"); }
    }
  });

  document.getElementById("closeAdminModal").addEventListener("click", () => document.getElementById("adminModal").classList.remove("active"));
  document.getElementById("closeRawModal").addEventListener("click", () => document.getElementById("rawModal").classList.remove("active"));
  document.getElementById("copyRawBtn").addEventListener("click", () => { navigator.clipboard.writeText(document.getElementById("rawContent").innerText); alert("✅ Script copied!"); });

  loadData();
  checkAdminSession();
  render();
</script>
</body>
</html>
