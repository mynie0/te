<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>RobloxScriptHub | Admin Panel + Images</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050510;
    --bg2: #080820;
    --card: #0d0d2b;
    --neon-pink: #ff2d78;
    --neon-cyan: #00f5ff;
    --neon-green: #39ff14;
    --neon-purple: #bf00ff;
    --neon-yellow: #ffe600;
    --text: #e0e0ff;
    --muted: #6060aa;
    --border: rgba(0,245,255,0.15);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: linear-gradient(rgba(0,245,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,245,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px);
    pointer-events: none;
    z-index: 0;
  }
  .container { max-width: 1100px; margin: 0 auto; padding: 0 20px; position: relative; z-index: 2; }

  /* HEADER */
  header { padding: 32px 0 24px; border-bottom: 1px solid var(--border); }
  .header-inner { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px; }
  .logo { font-family: 'Orbitron', monospace; font-size: 1.7rem; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; }
  .logo span:nth-child(1) { color: var(--neon-cyan); text-shadow: 0 0 18px var(--neon-cyan); }
  .logo span:nth-child(2) { color: var(--neon-pink); text-shadow: 0 0 18px var(--neon-pink); }
  .logo span:nth-child(3) { color: var(--neon-green); text-shadow: 0 0 18px var(--neon-green); }
  .logo-sub { font-family: 'Share Tech Mono', monospace; font-size: 0.72rem; color: var(--muted); letter-spacing: 4px; margin-top: 2px; }
  .badge { background: linear-gradient(135deg, var(--neon-purple), var(--neon-pink)); color: #fff; font-family: 'Share Tech Mono', monospace; font-size: 0.7rem; padding: 4px 12px; border-radius: 20px; letter-spacing: 1px; box-shadow: 0 0 18px rgba(191,0,255,0.5); animation: pulse 2s ease-in-out infinite; }
  .admin-btn { background: rgba(255,45,120,0.2); border: 1px solid var(--neon-pink); color: var(--neon-pink); font-family: 'Orbitron', monospace; font-size: 0.75rem; padding: 6px 16px; border-radius: 20px; cursor: pointer; transition: 0.2s; }
  .admin-btn:hover { background: rgba(255,45,120,0.4); box-shadow: 0 0 12px rgba(255,45,120,0.4); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.7} }

  /* SEARCH & FILTERS */
  .search-wrap { margin: 32px 0 28px; position: relative; }
  .search-icon { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--neon-cyan); font-size: 1rem; pointer-events: none; }
  #searchInput { width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 14px 18px 14px 46px; font-family: 'Share Tech Mono', monospace; font-size: 0.95rem; color: var(--text); outline: none; transition: 0.2s; }
  #searchInput:focus { border-color: var(--neon-cyan); box-shadow: 0 0 16px rgba(0,245,255,0.2); }
  .filter-tabs { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 28px; }
  .tab { font-family: 'Orbitron', monospace; font-size: 0.72rem; padding: 7px 18px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; transition: 0.2s; }
  .tab:hover { color: var(--text); border-color: var(--neon-cyan); }
  .tab.active { background: rgba(0,245,255,0.1); border-color: var(--neon-cyan); color: var(--neon-cyan); box-shadow: 0 0 12px rgba(0,245,255,0.2); }
  .stats { display: flex; gap: 24px; margin-bottom: 32px; flex-wrap: wrap; }
  .stat { font-family: 'Share Tech Mono', monospace; font-size: 0.78rem; color: var(--muted); }
  .stat b { color: var(--neon-yellow); font-size: 1rem; }

  /* SCRIPT GRID */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 20px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 22px; position: relative; transition: transform 0.2s, box-shadow 0.2s; animation: fadeIn 0.4s ease both; }
  .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--neon-cyan), var(--neon-pink), var(--neon-purple)); opacity: 0.7; }
  .card:hover { transform: translateY(-3px); box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 20px rgba(0,245,255,0.1); border-color: rgba(0,245,255,0.3); }
  @keyframes fadeIn { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:none} }
  .card-image { width: 100%; height: 140px; object-fit: cover; border-radius: 8px; margin-bottom: 14px; background: #0a0a1a; border: 1px solid var(--border); }
  .card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 10px; }
  .card-title { font-family: 'Orbitron', monospace; font-size: 0.92rem; font-weight: 700; color: #fff; }
  .card-tag { font-family: 'Share Tech Mono', monospace; font-size: 0.65rem; padding: 3px 10px; border-radius: 20px; white-space: nowrap; }
  .tag-free { background: rgba(57,255,20,0.12); color: var(--neon-green); border: 1px solid rgba(57,255,20,0.3); }
  .tag-keyless { background: rgba(0,245,255,0.12); color: var(--neon-cyan); border: 1px solid rgba(0,245,255,0.3); }
  .tag-paid { background: rgba(255,230,0,0.12); color: var(--neon-yellow); border: 1px solid rgba(255,230,0,0.3); }
  .card-game { font-family: 'Share Tech Mono', monospace; font-size: 0.72rem; color: var(--neon-purple); margin-bottom: 8px; }
  .card-desc { font-size: 0.88rem; color: #9090cc; line-height: 1.5; margin-bottom: 16px; }
  .card-features { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 18px; }
  .feat { font-family: 'Share Tech Mono', monospace; font-size: 0.65rem; padding: 3px 9px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 4px; color: #8080bb; }
  .card-actions { display: flex; gap: 10px; }
  .btn { flex: 1; font-family: 'Orbitron', monospace; font-size: 0.68rem; font-weight: 700; letter-spacing: 1px; padding: 9px 12px; border-radius: 6px; border: none; cursor: pointer; transition: all 0.2s; text-align: center; display: flex; align-items: center; justify-content: center; gap: 6px; background: transparent; }
  .btn-copy { border: 1px solid var(--neon-cyan); color: var(--neon-cyan); }
  .btn-copy:hover { background: rgba(0,245,255,0.2); box-shadow: 0 0 16px rgba(0,245,255,0.3); }
  .btn-raw { border: 1px solid var(--neon-pink); color: var(--neon-pink); }
  .btn-raw:hover { background: rgba(255,45,120,0.2); box-shadow: 0 0 16px rgba(255,45,120,0.3); }
  .btn.copied { background: rgba(57,255,20,0.15); border-color: var(--neon-green); color: var(--neon-green); }
  .empty { grid-column: 1/-1; text-align: center; padding: 60px 20px; color: var(--muted); font-family: 'Share Tech Mono', monospace; }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(5,5,16,0.94); backdrop-filter: blur(8px); z-index: 100; display: none; align-items: center; justify-content: center; padding: 20px; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--bg2); border: 1px solid var(--neon-cyan); border-radius: 16px; width: 100%; max-width: 850px; max-height: 90vh; display: flex; flex-direction: column; box-shadow: 0 0 40px rgba(0,245,255,0.3); }
  .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid rgba(0,245,255,0.3); }
  .modal-title { font-family: 'Orbitron', monospace; font-size: 0.9rem; color: var(--neon-cyan); }
  .modal-close { background: none; border: none; color: var(--muted); font-size: 1.5rem; cursor: pointer; transition: 0.2s; }
  .modal-close:hover { color: var(--neon-pink); }
  .modal-body { flex: 1; overflow-y: auto; padding: 20px; }
  .modal-body pre { font-family: 'Share Tech Mono', monospace; font-size: 0.8rem; color: #c0c0ff; white-space: pre-wrap; word-break: break-all; }
  .modal-footer { padding: 14px 20px; border-top: 1px solid rgba(0,245,255,0.2); display: flex; gap: 10px; justify-content: flex-end; }

  /* ADMIN FORM */
  .admin-form-group { margin-bottom: 18px; }
  .admin-form-group label { display: block; font-family: 'Share Tech Mono', monospace; font-size: 0.75rem; color: var(--neon-cyan); margin-bottom: 5px; letter-spacing: 1px; }
  .admin-form-group input, .admin-form-group textarea, .admin-form-group select { width: 100%; background: #0a0a1a; border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; color: white; font-family: 'Rajdhani', monospace; font-size: 0.9rem; outline: none; }
  .admin-form-group textarea { font-family: 'Share Tech Mono', monospace; font-size: 0.8rem; resize: vertical; min-height: 180px; }
  .admin-form-group input:focus, .admin-form-group textarea:focus { border-color: var(--neon-pink); }
  .admin-row { display: flex; gap: 12px; margin-bottom: 18px; flex-wrap: wrap; }
  .admin-row .admin-form-group { flex: 1; min-width: 150px; }
  .btn-danger { border-color: #ff2d78; color: #ff2d78; }
  .btn-success { border-color: var(--neon-green); color: var(--neon-green); }
  .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
  .admin-badge { background: #ff2d7822; border: 1px solid #ff2d78; border-radius: 20px; padding: 5px 12px; font-size: 0.7rem; color: var(--neon-pink); }
  .script-list-item { background: #0a0a1a; margin-bottom: 10px; padding: 12px; border-radius: 10px; border-left: 3px solid #ff2d78; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
  footer { margin-top: 60px; padding: 24px 0; border-top: 1px solid var(--border); text-align: center; font-family: 'Share Tech Mono', monospace; font-size: 0.72rem; color: var(--muted); }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--neon-purple); border-radius: 3px; }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="header-inner">
      <div><div class="logo"><span>Roblox</span><span>Script</span><span>Hub</span></div><div class="logo-sub">FREE SCRIPTS · KEYLESS · IMAGE SUPPORT</div></div>
      <button class="admin-btn" id="adminButton">🔧 ADMIN PANEL</button>
    </div>
  </header>
  <div class="search-wrap"><span class="search-icon">🔍</span><input id="searchInput" type="text" placeholder="Search script or game..."/></div>
  <div class="filter-tabs" id="filterTabs">
    <button class="tab active" data-filter="all">ALL</button>
    <button class="tab" data-filter="free">FREE</button>
    <button class="tab" data-filter="keyless">KEYLESS</button>
    <button class="tab" data-filter="paid">PAID</button>
  </div>
  <div class="stats"><div class="stat">Scripts: <b id="countAll">0</b></div><div class="stat">Shown: <b id="countShown">0</b></div></div>
  <div class="grid" id="scriptGrid"></div>
</div>
<footer><div class="container"><span>RobloxScriptHub</span> — Educational only | Admin Panel by button</div></footer>

<!-- RAW MODAL -->
<div class="modal-overlay" id="rawModal"><div class="modal"><div class="modal-header"><div class="modal-title" id="modalTitle">RAW SCRIPT</div><button class="modal-close" id="modalClose">✕</button></div><div class="modal-body"><pre id="modalContent"></pre></div><div class="modal-footer"><button class="btn btn-copy" id="modalCopyBtn" style="flex:none;">COPY</button><button class="btn btn-raw" style="flex:none;" id="modalCloseBtn">CLOSE</button></div></div></div>

<!-- ADMIN PANEL MODAL -->
<div class="modal-overlay" id="adminModal"><div class="modal"><div class="modal-header"><div class="modal-title">🛠️ ADMIN CONTROL PANEL | Manage Scripts + Images</div><button class="modal-close" id="adminModalClose">✕</button></div><div class="modal-body" id="adminModalBody">
  <div class="admin-header"><div class="admin-badge">🔐 Full CRUD + Image URL</div><button id="newScriptBtn" class="btn btn-success" style="flex:none; padding:6px 18px;">+ NEW SCRIPT</button></div>
  <div id="adminScriptsList" style="margin-bottom: 30px;"></div>
  <hr style="border-color:rgba(0,245,255,0.2); margin: 20px 0;">
  <h3 style="font-family:Orbitron;font-size:0.8rem;color:#00f5ff;">📝 Edit / Create Script</h3>
  <form id="adminForm"><input type="hidden" id="editIndex" value="-1">
    <div class="admin-form-group"><label>SCRIPT TITLE *</label><input type="text" id="formTitle" required placeholder="Wonder Chase V3"></div>
    <div class="admin-form-group"><label>GAME NAME *</label><input type="text" id="formGame" required placeholder="WONDER CHASE OBBY"></div>
    <div class="admin-form-group"><label>DESCRIPTION</label><textarea id="formDesc" rows="2" placeholder="Auto play obby dengan portal teleportation..."></textarea></div>
    <div class="admin-row"><div class="admin-form-group"><label>TAG</label><select id="formTag"><option value="free">FREE</option><option value="keyless">KEYLESS</option><option value="paid">PAID</option></select></div>
    <div class="admin-form-group"><label>FEATURES (comma)</label><input type="text" id="formFeatures" placeholder="Auto Portal, Pickup Collect, Anti-AFK"></div></div>
    <div class="admin-form-group"><label>🎨 IMAGE URL (opsional)</label><input type="text" id="formImage" placeholder="https://example.com/thumbnail.jpg"></div>
    <div class="admin-form-group"><label>LUA SCRIPT CODE *</label><textarea id="formCode" rows="10" placeholder="-- paste your script here..."></textarea></div>
    <div style="display: flex; gap: 12px; margin-top: 15px;"><button type="submit" class="btn btn-success" style="flex:1;">💾 SAVE / UPDATE</button><button type="button" id="cancelFormBtn" class="btn btn-raw" style="flex:1;">CANCEL</button></div>
  </form>
</div></div></div>

<script>
  // ========== DEFAULT SCRIPTS (dengan image contoh) ==========
  const defaultScripts = [
    { title: "Wonder Chase V3", game: "WONDER CHASE OBBY", desc: "Auto play obby dengan portal teleportation, sticker & pickup collection, anti-replay otomatis.", tag: "free", features: ["Auto Portal","Pickup Collect","Anti-AFK","Auto Replay"], image: "https://placehold.co/400x200/0d0d2b/00f5ff?text=Wonder+Chase", code: `-- Wonder Chase V3 | RobloxScriptHub\nlocal Players = game:GetService("Players")\nlocal VirtualUser = game:GetService("VirtualUser")\nlocal lp = Players.LocalPlayer\nlp.Idled:Connect(function() VirtualUser:Button2Down(Vector2.new(0,0), workspace.CurrentCamera.CFrame) task.wait(1) VirtualUser:Button2Up(Vector2.new(0,0), workspace.CurrentCamera.CFrame) end)\nprint("[WonderChase] Loaded")` },
    { title: "Orb Collector ESP", game: "ANY GAME (ORB)", desc: "Auto collect semua orb di workspace dengan ESP BillboardGui RGB, FPS booster, dan distance display.", tag: "keyless", features: ["Auto Collect","ESP RGB","FPS Boost"], image: "https://placehold.co/400x200/0d0d2b/39ff14?text=Orb+ESP", code: `-- Orb Collector ESP\nlocal RunService = game:GetService("RunService")\ngetgenv().OrbESP = true\nRunService.Heartbeat:Connect(function()\n    for _, obj in pairs(workspace:GetDescendants()) do\n        if obj:IsA("BasePart") and obj.Name:lower():find("orb") then\n            firetouchinterest(game.Players.LocalPlayer.Character.HumanoidRootPart, obj, 0)\n        end\n    end\nend)` },
    { title: "Inf Point Clicker", game: "ECLIPSE JOIN & CLAIM", desc: "Toggle Infinite Point yang fire AddPoint:FireServer() dan WalkSpeed boost.", tag: "keyless", features: ["Inf Points","WalkSpeed","Toggle"], image: "https://placehold.co/400x200/0d0d2b/ff2d78?text=Inf+Point", code: `-- Inf Point\nlocal RunService = game:GetService("RunService")\ngetgenv().InfPoint = true\nRunService.Heartbeat:Connect(function()\n    if getgenv().InfPoint then\n        game.Players.LocalPlayer.Character.Humanoid.WalkSpeed = 50\n        pcall(function() game:GetService("ReplicatedStorage"):WaitChild("AddPoint"):FireServer() end)\n    end\nend)` },
    { title: "Anti Lag Ultimate", game: "ALL GAMES", desc: "Optimasi performa Roblox: kurangi render quality, matiin shadow, fog, particle.", tag: "free", features: ["Low Quality","No Shadow","Hide Players"], image: "https://placehold.co/400x200/0d0d2b/bf00ff?text=Anti+Lag", code: `-- Anti Lag\nsettings().Rendering.QualityLevel = 1\ngame:GetService("Lighting").GlobalShadows = false\nprint("AntiLag Applied")` }
  ];

  let scriptsDB = [];
  let activeFilter = 'all';
  let searchQuery = '';

  // Load/Save to localStorage
  function loadData() {
    const stored = localStorage.getItem('RobloxScriptHub_DB');
    if(stored) {
      try {
        scriptsDB = JSON.parse(stored);
        if(!Array.isArray(scriptsDB)) throw new Error();
      } catch(e) { scriptsDB = JSON.parse(JSON.stringify(defaultScripts)); }
    } else {
      scriptsDB = JSON.parse(JSON.stringify(defaultScripts));
    }
    scriptsDB = scriptsDB.map(s => ({ ...s, features: Array.isArray(s.features) ? s.features : (s.features ? s.features.split(',').map(f=>f.trim()) : []) }));
    saveToLocal();
  }
  function saveToLocal() { localStorage.setItem('RobloxScriptHub_DB', JSON.stringify(scriptsDB)); }

  function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

  function getTagHtml(tag) {
    if(tag==='free') return '<span class="card-tag tag-free">FREE</span>';
    if(tag==='keyless') return '<span class="card-tag tag-keyless">KEYLESS</span>';
    return '<span class="card-tag tag-paid">PAID</span>';
  }

  function renderGrid() {
    const grid = document.getElementById('scriptGrid');
    const q = searchQuery.toLowerCase();
    const filtered = scriptsDB.filter(s => {
      const matchFilter = activeFilter==='all' || s.tag===activeFilter;
      const matchSearch = !q || s.title.toLowerCase().includes(q) || s.game.toLowerCase().includes(q) || s.desc.toLowerCase().includes(q);
      return matchFilter && matchSearch;
    });
    document.getElementById('countAll').innerText = scriptsDB.length;
    document.getElementById('countShown').innerText = filtered.length;
    if(filtered.length===0) {
      grid.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div>No scripts found for "<b>${escapeHtml(searchQuery)}</b>"</div>`;
      return;
    }
    grid.innerHTML = filtered.map(s => {
      const realIdx = scriptsDB.findIndex(orig => orig.title === s.title && orig.code === s.code);
      const imageHtml = s.image ? `<img class="card-image" src="${escapeHtml(s.image)}" alt="${escapeHtml(s.title)}" onerror="this.style.display='none'">` : '';
      return `<div class="card" style="animation-delay:0s" data-idx="${realIdx}">
        ${imageHtml}
        <div class="card-header"><div class="card-title">${escapeHtml(s.title)}</div>${getTagHtml(s.tag)}</div>
        <div class="card-game">📁 ${escapeHtml(s.game)}</div>
        <div class="card-desc">${escapeHtml(s.desc)}</div>
        <div class="card-features">${s.features.map(f=>`<span class="feat">${escapeHtml(f.trim())}</span>`).join('')}</div>
        <div class="card-actions"><button class="btn btn-copy" onclick="copyScript(${realIdx}, this)">⎘ COPY</button><button class="btn btn-raw" onclick="openRaw(${realIdx})">◈ RAW</button></div>
      </div>`;
    }).join('');
  }

  window.copyScript = function(idx, btn) {
    navigator.clipboard.writeText(scriptsDB[idx].code).then(() => {
      btn.innerText = '✓ COPIED'; btn.classList.add('copied');
      setTimeout(()=>{ btn.innerText = '⎘ COPY'; btn.classList.remove('copied'); }, 1800);
    });
  };
  window.openRaw = function(idx) {
    const s = scriptsDB[idx];
    document.getElementById('modalTitle').innerText = 'RAW — ' + s.title;
    document.getElementById('modalContent').innerText = s.code;
    document.getElementById('rawModal').classList.add('open');
    document.getElementById('modalCopyBtn').onclick = () => { navigator.clipboard.writeText(s.code); const copyBtn = document.getElementById('modalCopyBtn'); copyBtn.innerText = '✓ COPIED'; setTimeout(()=> copyBtn.innerText = 'COPY', 1600); };
  };

  // Admin functions
  function refreshAdminList() {
    const container = document.getElementById('adminScriptsList');
    if(!container) return;
    container.innerHTML = `<div style="font-family:monospace; margin-bottom:12px;">📋 Total scripts: ${scriptsDB.length}</div>`;
    scriptsDB.forEach((scr, i) => {
      const div = document.createElement('div');
      div.className = 'script-list-item';
      div.innerHTML = `<div><strong style="color:#00f5ff;">${escapeHtml(scr.title)}</strong><span style="color:#9090cc; margin-left:10px;font-size:0.7rem;">${scr.tag}</span><div style="font-size:0.7rem; color:#6060aa;">${escapeHtml(scr.game)}</div></div>
      <div><button class="btn btn-copy" style="padding:4px 12px; font-size:0.7rem;" onclick="editScriptByAdmin(${i})">✏️ EDIT</button>
      <button class="btn btn-danger" style="padding:4px 12px; font-size:0.7rem; margin-left:8px;" onclick="deleteScriptByAdmin(${i})">🗑️ DELETE</button></div>`;
      container.appendChild(div);
    });
  }
  window.editScriptByAdmin = function(idx) {
    const s = scriptsDB[idx];
    document.getElementById('editIndex').value = idx;
    document.getElementById('formTitle').value = s.title;
    document.getElementById('formGame').value = s.game;
    document.getElementById('formDesc').value = s.desc || '';
    document.getElementById('formTag').value = s.tag;
    document.getElementById('formFeatures').value = Array.isArray(s.features) ? s.features.join(', ') : '';
    document.getElementById('formImage').value = s.image || '';
    document.getElementById('formCode').value = s.code;
    document.getElementById('adminModal').classList.add('open');
  };
  window.deleteScriptByAdmin = function(idx) {
    if(confirm(`Permanently delete "${scriptsDB[idx].title}"? This cannot be undone.`)) {
      scriptsDB.splice(idx,1);
      saveToLocal();
      renderGrid();
      if(document.getElementById('adminModal').classList.contains('open')) refreshAdminList();
    }
  };
  function resetAdminForm() {
    document.getElementById('editIndex').value = -1;
    document.getElementById('formTitle').value = '';
    document.getElementById('formGame').value = '';
    document.getElementById('formDesc').value = '';
    document.getElementById('formTag').value = 'free';
    document.getElementById('formFeatures').value = '';
    document.getElementById('formImage').value = '';
    document.getElementById('formCode').value = '';
  }

  // Event Listeners
  document.getElementById('adminButton')?.addEventListener('click', () => {
    refreshAdminList();
    document.getElementById('adminModal').classList.add('open');
  });
  document.getElementById('newScriptBtn')?.addEventListener('click',()=>{ resetAdminForm(); document.getElementById('editIndex').value = -1; document.getElementById('adminModal').classList.add('open'); });
  document.getElementById('adminForm')?.addEventListener('submit', (e) => {
    e.preventDefault();
    const idx = parseInt(document.getElementById('editIndex').value);
    const newScript = {
      title: document.getElementById('formTitle').value.trim(),
      game: document.getElementById('formGame').value.trim(),
      desc: document.getElementById('formDesc').value.trim(),
      tag: document.getElementById('formTag').value,
      features: document.getElementById('formFeatures').value.split(',').map(f=>f.trim()).filter(f=>f),
      image: document.getElementById('formImage').value.trim(),
      code: document.getElementById('formCode').value
    };
    if(!newScript.title || !newScript.game || !newScript.code) { alert("Title, Game and Code required!"); return; }
    if(idx === -1) scriptsDB.push(newScript);
    else scriptsDB[idx] = newScript;
    saveToLocal();
    renderGrid();
    refreshAdminList();
    document.getElementById('adminModal').classList.remove('open');
    resetAdminForm();
  });
  document.getElementById('cancelFormBtn')?.addEventListener('click',()=>{ document.getElementById('adminModal').classList.remove('open'); resetAdminForm(); });
  document.getElementById('adminModalClose')?.addEventListener('click',()=>{ document.getElementById('adminModal').classList.remove('open'); });
  document.getElementById('adminModal')?.addEventListener('click', function(e){ if(e.target===this) this.classList.remove('open'); });
  document.getElementById('modalClose').onclick = ()=>document.getElementById('rawModal').classList.remove('open');
  document.getElementById('modalCloseBtn').onclick = ()=>document.getElementById('rawModal').classList.remove('open');
  document.getElementById('rawModal').onclick = function(e){ if(e.target===this) this.classList.remove('open'); };
  document.getElementById('searchInput').addEventListener('input', e => { searchQuery = e.target.value; renderGrid(); });
  document.getElementById('filterTabs').addEventListener('click', e => { if(e.target.classList.contains('tab')){ document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); e.target.classList.add('active'); activeFilter = e.target.dataset.filter; renderGrid(); } });
  
  loadData();
  renderGrid();
</script>
</body>
</html>
